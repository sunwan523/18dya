<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中高考理科复习资料 - 知识框架</title>
<style>
:root {
  --bg: #f8f9fa;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text-secondary: #555;
  --primary: #4a6cf7;
  --primary-light: #e8edfe;
  --border: #e2e8f0;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --header-bg: rgba(255,255,255,0.92);
  --toc-bg: #fff;
  --tag-math: #3b82f6;
  --tag-physics: #10b981;
  --tag-chemistry: #f59e0b;
  --tag-biology: #ef4444;
  --tag-english: #8b5cf6;
  --progress-bar: #4a6cf7;
  --tts-active: #ef4444;
}
[data-theme="dark"] {
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --primary: #60a5fa;
  --primary-light: #1e293b;
  --border: #334155;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --header-bg: rgba(15,23,42,0.95);
  --toc-bg: #1e293b;
  --progress-bar: #60a5fa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  font-size: 16px;
  transition: background 0.3s, color 0.3s;
}
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.3s;
}
.header-title {
  font-size: 16px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 200px;
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.header-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.header-btn:hover { background: var(--primary-light); color: var(--primary); }
.header-btn.active { background: var(--tts-active); color: #fff; border-color: var(--tts-active); }
.progress-bar-wrap {
  position: fixed; top: 56px; left: 0; right: 0; z-index: 999;
  height: 3px; background: var(--border);
}
.progress-bar-fill {
  height: 100%; width: 0%;
  background: var(--progress-bar);
  transition: width 0.3s;
}
.main {
  max-width: 800px; margin: 80px auto 40px; padding: 0 16px;
}
.subject-section {
  margin-bottom: 28px;
}
.subject-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.subject-header:hover { opacity: 0.85; }
.subject-header .icon { font-size: 22px; }
.subject-header .title { font-size: 18px; font-weight: 700; flex: 1; }
.subject-header .arrow { font-size: 14px; transition: transform 0.3s; color: var(--text-secondary); }
.subject-header .arrow.open { transform: rotate(90deg); }
.subject-header .tag {
  font-size: 11px; padding: 2px 10px; border-radius: 20px;
  color: #fff; font-weight: 600;
}
.subject-content {
  display: none;
  padding: 4px 0;
}
.subject-content.open { display: block; }
.topic-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: background 0.3s, border-color 0.3s;
}
.topic-title {
  font-size: 15px; font-weight: 700;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.topic-title .priority {
  font-size: 11px; padding: 1px 8px; border-radius: 4px;
  font-weight: 600;
}
.priority-high { background: #fef2f2; color: #dc2626; }
.priority-mid { background: #fef9c3; color: #a16207; }
[data-theme="dark"] .priority-high { background: #450a0a; color: #fca5a5; }
[data-theme="dark"] .priority-mid { background: #422006; color: #fde68a; }
.topic-body { font-size: 14.5px; color: var(--text-secondary); }
.topic-body p { margin-bottom: 6px; }
.topic-body .highlight {
  background: var(--primary-light);
  padding: 1px 6px; border-radius: 3px;
  color: var(--primary); font-weight: 600;
}
.topic-body ul { padding-left: 18px; margin: 4px 0; }
.topic-body li { margin-bottom: 4px; }
.topic-card.marked {
  border-left: 3px solid #22c55e;
}
.topic-card.marked .topic-body {
  display: none;
}
.topic-card.marked .topic-title::after {
  content: ' (已掌握，点击展开)';
  font-size: 12px;
  color: #22c55e;
  font-weight: normal;
}
.mark-btn {
  float: right;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: all 0.2s;
}
.mark-btn:hover { background: #fef3c7; border-color: #f59e0b; }
.mark-btn.marked { background: #dcfce7; border-color: #22c55e; }
.toc-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
}
.toc-overlay.open { display: block; }
.toc-panel {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 2001;
  width: 300px; max-width: 80vw;
  background: var(--toc-bg);
  padding: 20px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.3s;
  border-right: 1px solid var(--border);
}
.toc-panel.open { transform: translateX(0); }
.toc-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--primary); }
.toc-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  margin-bottom: 4px;
}
.toc-item:hover { background: var(--primary-light); color: var(--primary); }
.toc-item .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.tts-bar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
  transition: background 0.3s;
}
.tts-bar.open { display: block; }
.tts-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; text-align: center; }
.tts-controls { display: flex; align-items: center; justify-content: center; gap: 12px; }
.tts-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.tts-btn:hover { background: var(--primary-light); color: var(--primary); }
.tts-btn.play { width: 48px; height: 48px; background: var(--primary); color: #fff; border-color: var(--primary); }
.tts-btn.play:hover { opacity: 0.85; }
.tts-btn.play.active { background: var(--tts-active); border-color: var(--tts-active); }
.tts-speed {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
}
.tts-speed select {
  padding: 2px 6px; border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 12px;
}
.tts-voice { font-size: 12px; color: var(--text-secondary); margin-top: 4px; text-align: center; }
.tts-highlight {
  background: #fef08a !important;
  border-radius: 2px;
  transition: background 0.1s;
}
[data-theme="dark"] .tts-highlight {
  background: #713f12 !important;
}
.read-progress-badge {
  position: fixed; bottom: 80px; right: 16px; z-index: 999;
  font-size: 11px; color: var(--text-secondary);
  background: var(--card-bg);
  padding: 6px 12px; border-radius: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  opacity: 0;
  transition: opacity 0.3s;
}
.read-progress-badge.show { opacity: 1; }
@media (max-width: 600px) {
  .main { padding: 0 12px; }
  .topic-card { padding: 14px 16px; }
  .subject-header { padding: 12px 16px; }
  .header-title { font-size: 14px; max-width: 140px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">📚 中高考复习资料</div>
  <div class="header-actions">
    <button class="header-btn" onclick="toggleTOC()" title="目录">☰</button>
    <button class="header-btn" onclick="toggleTTS()" title="语音朗读">🔊</button>
    <button class="header-btn" onclick="toggleTheme()" title="切换主题">🌓</button>
  </div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>

<div class="toc-overlay" id="tocOverlay" onclick="toggleTOC()"></div>
<div class="toc-panel" id="tocPanel">
  <div class="toc-title">📑 目录</div>
  <div id="tocList"></div>
</div>

<div class="main" id="mainContent"></div>

<div class="tts-bar" id="ttsBar">
  <div class="tts-info" id="ttsInfo">选择一段文字开始朗读</div>
  <div class="tts-controls">
    <button class="tts-btn" onclick="ttsPrev()" title="上一句">⏮</button>
    <button class="tts-btn play" id="ttsPlayBtn" onclick="ttsToggle()" title="播放/暂停">▶</button>
    <button class="tts-btn" onclick="ttsNext()" title="下一句">⏭</button>
    <button class="tts-btn" onclick="ttsStop()" title="停止">⏹</button>
    <div class="tts-speed">
      <span>速度</span>
      <select id="ttsSpeed" onchange="ttsUpdateSpeed()">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
  </div>
  <div class="tts-voice" id="ttsVoiceInfo"></div>
</div>

<div class="read-progress-badge" id="progressBadge">已读 0%</div>

<script>
const DATA = [
  {
    id: "math", title: "数学", icon: "📐", color: "#3b82f6", tag: "数学", tagColor: "var(--tag-math)",
    topics: [
      { title: "集合的基本概念", priority: "high", items: [
        "集合的定义：由确定的、互不相同的元素组成的整体，常用大写字母A、B、C表示。",
        "元素的特性：确定性（元素是否属于集合是确定的）、互异性（集合中元素互不相同）、无序性（元素顺序无关）。",
        "常用数集：N（自然数集，含0）、N+（正整数集）、Z（整数集）、Q（有理数集）、R（实数集）。",
        "表示方法：列举法（{1,2,3}）、描述法（{x|x>0}）、韦恩图（用图形表示集合关系）。"
      ]},
      { title: "集合的运算", priority: "high", items: [
        "交集（∩）：A∩B={x|x∈A且x∈B}，即两个集合的公共元素，性质：A∩B=B∩A，A∩A=A，A∩∅=∅。",
        "并集（∪）：A∪B={x|x∈A或x∈B}，即两个集合的所有元素，性质：A∪B=B∪A，A∪A=A，A∪∅=A。",
        "补集（∁U）：∁UA={x|x∈U且x∉A}，即全集中不属于A的元素，性质：A∪∁UA=U，A∩∁UA=∅。",
        "差集（-）：A-B={x|x∈A且x∉B}，即属于A但不属于B的元素。"
      ]},
      { title: "区间表示法", priority: "mid", items: [
        "闭区间：[a,b]，表示a≤x≤b，包含端点a和b。",
        "开区间：(a,b)，表示a<x<b，不包含端点。",
        "半开半闭区间：[a,b)表示a≤x<b，(a,b]表示a<x≤b。",
        "无穷区间：[a,+∞)表示x≥a，(-∞,b]表示x≤b，(-∞,+∞)表示全体实数。"
      ]},
      { title: "函数的概念", priority: "high", items: [
        "函数定义：设A、B是非空数集，如果按照某种对应关系f，使对于集合A中的任意一个数x，在集合B中都有唯一确定的数f(x)和它对应，那么就称f:A→B为从集合A到集合B的一个函数。",
        "三要素：定义域（自变量x的取值范围）、值域（函数值y的取值范围）、对应关系（函数表达式）。",
        "表示方法：解析法（y=f(x)）、列表法、图像法。",
        "相等函数：定义域和对应关系都相同的两个函数相等，与函数名称无关。"
      ]},
      { title: "函数的定义域", priority: "high", items: [
        "分式函数：分母不能为0，如y=1/x中x≠0。",
        "偶次根式：被开方数非负，如y=√x中x≥0。",
        "对数函数：真数大于0，底数大于0且不等于1，如y=log₂x中x>0。",
        "零次幂：底数不能为0，如y=x⁰中x≠0。",
        "实际问题：结合实际意义确定定义域，如人数不能为负数。"
      ]},
      { title: "函数的值域", priority: "high", items: [
        "配方法：适用于二次函数，如y=x²-2x+3=(x-1)²+2≥2，值域为[2,+∞)。",
        "单调性法：根据函数单调性求值域，如y=x在R上单调递增。",
        "换元法：将复杂函数转化为简单函数，如y=x+√(x-1)，令t=√(x-1)≥0。",
        "不等式法：利用基本不等式a+b≥2√(ab)（a,b>0）求最值。"
      ]},
      { title: "函数的单调性", priority: "high", items: [
        "定义法：设x₁,x₂∈D，若x₁<x₂时恒有f(x₁)<f(x₂)，则f(x)在D上单调递增；若f(x₁)>f(x₂)，则单调递减。",
        "导数法：若f'(x)>0，则f(x)单调递增；若f'(x)<0，则f(x)单调递减。",
        "复合函数单调性：同增异减（内外函数单调性相同则增，不同则减）。",
        "常见结论：增+增=增，减+减=减，增-减=增，减-增=减。"
      ]},
      { title: "函数的奇偶性", priority: "high", items: [
        "判断前提：定义域关于原点对称，否则非奇非偶。",
        "偶函数：f(-x)=f(x)，图像关于y轴对称，如y=x²、y=|x|。",
        "奇函数：f(-x)=-f(x)，图像关于原点对称，如y=x³、y=sinx。",
        "重要性质：奇函数在x=0处有定义，则f(0)=0；偶函数的绝对值是偶函数。"
      ]},
      { title: "二次函数", priority: "high", items: [
        "一般式：y=ax²+bx+c（a≠0），a决定开口方向（a>0向上，a<0向下）。",
        "顶点式：y=a(x-h)²+k，顶点坐标为(h,k)，对称轴为x=h。",
        "交点式：y=a(x-x₁)(x-x₂)，x₁、x₂是与x轴交点的横坐标。",
        "判别式：Δ=b²-4ac，Δ>0有两个不等实根，Δ=0有一个实根，Δ<0无实根。",
        "最值：a>0时，x=-b/(2a)时y有最小值(4ac-b²)/(4a)；a<0时，x=-b/(2a)时y有最大值。"
      ]},
      { title: "指数函数", priority: "high", items: [
        "定义：y=a^x（a>0且a≠1），定义域为R，值域为(0,+∞)。",
        "图像特征：恒过点(0,1)；a>1时单调递增，0<a<1时单调递减。",
        "运算性质：a^m·a^n=a^(m+n)，a^m÷a^n=a^(m-n)，(a^m)^n=a^(mn)，a^0=1（a≠0）。",
        "特殊值：a^(-n)=1/a^n，√a=a^(1/2)，a^(m/n)=ⁿ√(a^m)。"
      ]},
      { title: "对数函数", priority: "high", items: [
        "定义：y=log_a x（a>0且a≠1），定义域为(0,+∞)，值域为R。",
        "图像特征：恒过点(1,0)；a>1时单调递增，0<a<1时单调递减。",
        "运算性质：log_a(M·N)=log_aM+log_aN，log_a(M/N)=log_aM-log_aN，log_aM^n=nlog_aM。",
        "换底公式：log_ab=log_cb/log_ca，常用log_ab=ln b/ln a或log_ab=lg b/lg a。"
      ]},
      { title: "等差数列", priority: "high", items: [
        "定义：从第二项起，每一项与前一项的差为常数d（公差），即aₙ₊₁-aₙ=d。",
        "通项公式：aₙ=a₁+(n-1)d，已知首项a₁和公差d可求任意项。",
        "求和公式：Sₙ=n(a₁+aₙ)/2=na₁+n(n-1)d/2。",
        "重要性质：若m+n=p+q，则aₘ+aₙ=aₚ+a_q；连续k项的和成等差数列。"
      ]},
      { title: "等比数列", priority: "high", items: [
        "定义：从第二项起，每一项与前一项的比为常数q（公比），即aₙ₊₁/aₙ=q（q≠0）。",
        "通项公式：aₙ=a₁q^(n-1)，注意q≠0，a₁≠0。",
        "求和公式：q≠1时Sₙ=a₁(1-qⁿ)/(1-q)；q=1时Sₙ=na₁（常考q=1的特殊情况）。",
        "重要性质：若m+n=p+q，则aₘ·aₙ=aₚ·a_q；连续k项的和（不为0）成等比数列。"
      ]},
      { title: "概率基础", priority: "high", items: [
        "概率定义：事件发生的可能性大小，0≤P(A)≤1，必然事件P=1，不可能事件P=0。",
        "古典概型：满足有限性（基本事件有限个）和等可能性（每个基本事件概率相等），P(A)=事件A包含的基本事件数/总基本事件数。",
        "互斥事件：不能同时发生的事件，P(A∪B)=P(A)+P(B)。",
        "对立事件：A与∁UA，P(A)+P(∁UA)=1。"
      ]},
      { title: "统计", priority: "high", items: [
        "平均数：反映数据平均水平，¯x=(x₁+x₂+...+xₙ)/n。",
        "中位数：将数据从小到大排列后位于中间位置的数（n为奇数取中间，n为偶数取中间两数的平均）。",
        "众数：出现次数最多的数，可能有多个。",
        "方差：反映数据波动大小，s²=1/n[(x₁-¯x)²+(x₂-¯x)²+...+(xₙ-¯x)²]，方差越小数据越稳定。",
        "标准差：s=√s²，与数据单位相同，更易理解。"
      ]},
      { title: "排列组合", priority: "mid", items: [
        "排列（有序）：从n个不同元素中取k个排成一列，A(n,k)=n!/(n-k)!。",
        "组合（无序）：从n个不同元素中取k个组成一组，C(n,k)=n!/(k!(n-k)!)。",
        "乘法原理：分步完成，总方法数=各步方法数相乘。",
        "加法原理：分类完成，总方法数=各类方法数相加。",
        "常见模型：相邻问题用捆绑法，不相邻问题用插空法，特殊元素优先考虑。"
      ]},
      { title: "立体几何", priority: "high", items: [
        "空间中的线线关系：平行（没有公共点）、相交（有一个公共点）、异面（不同在任何一个平面内）。",
        "线面平行判定：平面外一条直线与平面内一条直线平行，则线面平行。",

      { title: "名词性从句", priority: "high", items: [
        "主语从句：在句中作主语，常用that、whether、what、who、which引导，如“That he came late made the teacher angry.”",
        "宾语从句：在句中作宾语，常用that（可省略）、whether/if、what、who引导，如“I think (that) he is right.”",
        "表语从句：在句中作表语，常用that、whether、what引导，如“The fact is that he didn't come.”",
        "同位语从句：解释说明前面的名词，常用that引导，如“The news that he won the game is true.”"
      ]},
      { title: "状语从句", priority: "high", items: [
        "时间状语从句：when（当……时）、while（当……时，强调同时）、as（一边……一边）、before（在……之前）、after（在……之后）、since（自从）、until（直到）。",
        "条件状语从句：if（如果）、unless（除非）、as long as（只要），主将从现：主句用将来时，从句用现在时。",
        "原因状语从句：because（因为，直接原因）、since（既然，已知原因）、as（由于，轻微原因）。",
        "让步状语从句：though/although（虽然）、even if/even though（即使）、no matter what（无论什么）。",
        "目的状语从句：so that（以便）、in order that（为了），从句常用情态动词。",
        "结果状语从句：so...that（如此……以至于）、such...that（如此……以至于），so修饰形容词/副词，such修饰名词。"
      ]},
      { title: "非谓语动词", priority: "high", items: [
        "不定式（to do）：表示目的、将来、结果，如“I want to go home.”“He came to see me.”，否定形式not to do。",
        "动名词（doing）：表示主动、进行、习惯，可作主语、宾语、定语，如“Reading is good for you.”“I like swimming.”，否定形式not doing。",
        "分词：现在分词（doing，主动、进行）和过去分词（done，被动、完成），可作定语、状语、补语，如“a running boy”“The book written by Lu Xun is famous.”"
      ]},
      { title: "情态动词", priority: "high", items: [
        "can：能力（会）、可能性（可能）、请求许可（可以），否定can't。",
        "could：can的过去式、委婉请求，如“Could you help me?”。",
        "may：可能性（可能）、请求许可（可以），否定may not，回答用can/can't。",
        "might：may的过去式、可能性更小，如“It might rain tomorrow.”。",
        "must：必须、肯定（推测），否定mustn't（禁止），否定推测用can't。",
        "should：应该、建议，如“You should study hard.”。",
        "need：需要，作情态动词时否定needn't，作实义动词时否定don't need to。"
      ]},
      { title: "阅读理解技巧", priority: "high", items: [
        "略读（Skimming）：快速浏览文章标题、首尾段、每段首句，了解文章大意。",
        "寻读（Scanning）：根据题目中的关键词（人名、地名、数字、时间）快速定位相关信息。",
        "精读（Close Reading）：对定位到的段落进行仔细阅读，理解细节和推理。",
        "同义替换：正确答案通常是原文的同义改写，注意同义词、同义结构。",
        "排除法：排除与原文矛盾、偷换概念、无中生有、过于绝对的选项。",
        "主旨题：关注文章首尾段、每段中心句，避免选择细节性选项。",
        "推理题：基于原文信息进行合理推断，不能主观臆断。"
      ]},
      { title: "完形填空技巧", priority: "high", items: [
        "通读全文：了解文章大意，把握整体语境。",
        "逻辑关系：通过转折（but、however）、因果（because、so）、递进（and、also）、并列（and、or）等连接词判断答案。",
        "固定搭配：积累常用短语和句型，如take care of、look forward to、be good at。",
        "语法知识：注意时态、语态、主谓一致、代词指代等。",
        "语义复现：注意文中重复出现的词汇或同义词汇。",
        "代入验证：将选项代入空格，检查是否符合语境和语法。"
      ]},
      { title: "语法填空技巧", priority: "high", items: [
        "纯空格题：考虑冠词（a/an/the）、介词（in/on/at/with）、连词（and/but/if/because）、代词（it/they/this/that）。",
        "给出动词题：考虑时态（根据上下文判断）、语态（主动/被动）、非谓语动词（to do/doing/done）。",
        "词性转换题：根据句子结构和语境，将名词、动词、形容词、副词进行转换，注意词形变化（名词复数、动词过去式、形容词比较级）。",
        "固定搭配：注意短语中的介词、冠词等。"
      ]},
      { title: "书面表达模板", priority: "high", items: [
        "建议信：开头（I'm writing to give you some advice on...）；主体（First... Second... Third...）；结尾（I hope my advice will be helpful.）。",
        "邀请信：开头（I'm writing to invite you to...）；主体（时间、地点、活动内容）；结尾（Looking forward to your reply.）。",
        "感谢信：开头（I'm writing to express my thanks for...）；主体（感谢的原因）；结尾（Thank you again.）。",
        "演讲稿：开头（Dear teachers and classmates,）；主体（分点论述）；结尾（Thank you for listening.）。",
        "议论文：开头（Nowadays, ... has become a hot topic.）；主体（观点+论据）；结尾（In my opinion, ...）。",
        "记叙文：开头（时间、地点、人物）；主体（事件经过）；结尾（感受或启示）。"
      ]},
      { title: "常用句型", priority: "high", items: [
        "There be句型：There is/are...，表示“有……”，注意主谓一致。",
        "It句型：It is+形容词+to do（做某事是……的）；It is+形容词+that从句；It takes sb. some time to do sth.（某人花费时间做某事）。",
        "比较级和最高级：比较级+than；as+形容词/副词原级+as（和……一样）；the+最高级+in/of（在……中最……）。",
        "感叹句：What+a/an+形容词+可数名词单数+主语+谓语！；How+形容词/副词+主语+谓语！",
        "倒装句：Only then did I realize...（只有那时我才意识到……）；Never have I seen...（我从未见过……）。"
      ]}
    ]
  }
];

let currentSubject = null;
let ttsActive = false;
let ttsPaused = false;
let ttsUtterance = null;
let ttsSentences = [];
let ttsIndex = -1;
let ttsTimer = null;

let markedTopics = {};

function loadMarkedTopics() {
  const saved = localStorage.getItem('markedTopics');
  if (saved) {
    try {
      markedTopics = JSON.parse(saved);
    } catch(e) {}
  }
}

function saveMarkedTopics() {
  localStorage.setItem('markedTopics', JSON.stringify(markedTopics));
}

function toggleMark(si, ti) {
  const key = `${si}-${ti}`;
  markedTopics[key] = !markedTopics[key];
  saveMarkedTopics();
  const card = document.getElementById(`card-${si}-${ti}`);
  const btn = document.getElementById(`mark-btn-${si}-${ti}`);
  if (markedTopics[key]) {
    card.classList.add('marked');
    btn.classList.add('marked');
    btn.innerHTML = '✓';
  } else {
    card.classList.remove('marked');
    btn.classList.remove('marked');
    btn.innerHTML = '☆';
  }
}

function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  DATA.forEach((subject, si) => {
    const section = document.createElement('div');
    section.className = 'subject-section';
    section.dataset.subject = subject.id;

    const header = document.createElement('div');
    header.className = 'subject-header';
    header.style.borderLeft = `4px solid ${subject.color}`;
    header.innerHTML = `
      <span class="icon">${subject.icon}</span>
      <span class="title">${subject.title}</span>
      <span class="tag" style="background:${subject.tagColor}">${subject.tag}</span>
      <span class="arrow">▶</span>
    `;
    header.onclick = () => toggleSubject(si);
    section.appendChild(header);

    const content = document.createElement('div');
    content.className = 'subject-content';
    content.id = `subject-${si}`;

    subject.topics.forEach((topic, ti) => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.id = `card-${si}-${ti}`;
      const isMarked = markedTopics[`${si}-${ti}`];
      if (isMarked) card.classList.add('marked');

      const titleDiv = document.createElement('div');
      titleDiv.className = 'topic-title';
      const pri = topic.priority === 'high' ? 'priority-high' : 'priority-mid';
      const priLabel = topic.priority === 'high' ? '★ 必考' : '📌 常考';
      titleDiv.innerHTML = `${topic.title} <span class="priority ${pri}">${priLabel}</span>`;
      
      const markBtn = document.createElement('button');
      markBtn.className = 'mark-btn';
      markBtn.id = `mark-btn-${si}-${ti}`;
      markBtn.innerHTML = isMarked ? '✓' : '☆';
      if (isMarked) markBtn.classList.add('marked');
      markBtn.title = '标记已掌握，下次自动隐藏';
      markBtn.onclick = (e) => { e.stopPropagation(); toggleMark(si, ti); };
      titleDiv.appendChild(markBtn);
      
      card.appendChild(titleDiv);

      const body = document.createElement('div');
      body.className = 'topic-body';
      topic.items.forEach(item => {
        const p = document.createElement('p');
        p.textContent = item;
        p.dataset.tts = item;
        body.appendChild(p);
      });
      card.appendChild(body);
      
      card.onclick = () => {
        if (isMarked) {
          card.classList.toggle('marked');
          const btn = document.getElementById(`mark-btn-${si}-${ti}`);
          if (!card.classList.contains('marked')) {
            btn.innerHTML = '☆';
            btn.classList.remove('marked');
            delete markedTopics[`${si}-${ti}`];
            saveMarkedTopics();
          } else {
            btn.innerHTML = '✓';
            btn.classList.add('marked');
            markedTopics[`${si}-${ti}`] = true;
            saveMarkedTopics();
          }
        }
      };
      
      content.appendChild(card);
    });

    section.appendChild(content);
    main.appendChild(section);
  });

  renderTOC();
}

function renderTOC() {
  const list = document.getElementById('tocList');
  list.innerHTML = '';
  DATA.forEach((subject, si) => {
    const item = document.createElement('div');
    item.className = 'toc-item';
    item.innerHTML = `<span class="dot" style="background:${subject.color}"></span><span>${subject.icon} ${subject.title}</span>`;
    item.onclick = () => {
      toggleTOC();
      scrollToSubject(si);
    };
    list.appendChild(item);
  });
}

function scrollToSubject(si) {
  const header = document.querySelectorAll('.subject-header')[si];
  if (header) {
    if (!document.getElementById(`subject-${si}`).classList.contains('open')) {
      toggleSubject(si);
    }
    header.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function toggleSubject(si) {
  const content = document.getElementById(`subject-${si}`);
  const arrow = content.parentElement.querySelector('.arrow');
  const isOpen = content.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
  if (isOpen && currentSubject === null) currentSubject = si;
  saveProgress();
}

function toggleTOC() {
  document.getElementById('tocOverlay').classList.toggle('open');
  document.getElementById('tocPanel').classList.toggle('open');
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

function saveProgress() {
  const state = { scrollY: window.scrollY, subjects: {} };
  DATA.forEach((_, si) => {
    state.subjects[si] = document.getElementById(`subject-${si}`).classList.contains('open');
  });
  state.theme = document.documentElement.getAttribute('data-theme');
  localStorage.setItem('readerProgress', JSON.stringify(state));
}

function loadProgress() {
  const saved = localStorage.getItem('readerProgress');
  if (!saved) return;
  try {
    const state = JSON.parse(saved);
    if (state.theme) document.documentElement.setAttribute('data-theme', state.theme);
    DATA.forEach((_, si) => {
      if (state.subjects && state.subjects[si]) {
        const content = document.getElementById(`subject-${si}`);
        if (content) {
          content.classList.add('open');
          const arrow = content.parentElement.querySelector('.arrow');
          if (arrow) arrow.classList.add('open');
        }
      }
    });
    setTimeout(() => { window.scrollTo(0, state.scrollY || 0); }, 100);
  } catch(e) {}
}

function updateProgressBar() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? Math.min(100, Math.round((scrollTop / docHeight) * 100)) : 0;
  document.getElementById('progressFill').style.width = progress + '%';
  const badge = document.getElementById('progressBadge');
  badge.textContent = `已读 ${progress}%`;
  badge.classList.toggle('show', progress > 0 && progress < 100);
  if (progress >= 100) badge.classList.remove('show');
}

// TTS Functions
function toggleTTS() {
  const bar = document.getElementById('ttsBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open')) {
    initTTS();
  } else {
    ttsStop();
  }
}

function initTTS() {
  if (!window.speechSynthesis) {
    document.getElementById('ttsInfo').textContent = '⚠️ 您的浏览器不支持语音朗读';
    return;
  }
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  document.getElementById('ttsVoiceInfo').textContent = zhVoice ? `朗读音色：${zhVoice.name}` : '';
  collectSentences();
}

function collectSentences() {
  ttsSentences = [];
  document.querySelectorAll('.topic-body p').forEach(p => {
    const text = p.textContent.trim();
    if (text) ttsSentences.push({ text, element: p });
  });
  document.querySelectorAll('.topic-body li').forEach(li => {
    const text = li.textContent.trim();
    if (text) ttsSentences.push({ text, element: li });
  });
}

function ttsToggle() {
  if (ttsActive && !ttsPaused) {
    ttsPause();
  } else if (ttsActive && ttsPaused) {
    ttsResume();
  } else {
    ttsPlay();
  }
}

function ttsPlay() {
  if (ttsSentences.length === 0) {
    collectSentences();
    if (ttsSentences.length === 0) return;
  }
  ttsIndex = 0;
  ttsActive = true;
  ttsPaused = false;
  document.getElementById('ttsPlayBtn').textContent = '⏸';
  document.getElementById('ttsPlayBtn').classList.add('active');
  document.getElementById('ttsInfo').textContent = '朗读中...';
  speakCurrent();
}

function ttsPause() {
  ttsPaused = true;
  window.speechSynthesis.pause();
  document.getElementById('ttsPlayBtn').textContent = '▶';
  document.getElementById('ttsPlayBtn').classList.remove('active');
  document.getElementById('ttsInfo').textContent = '已暂停';
}

function ttsResume() {
  ttsPaused = false;
  window.speechSynthesis.resume();
  document.getElementById('ttsPlayBtn').textContent = '⏸';
  document.getElementById('ttsPlayBtn').classList.add('active');
  document.getElementById('ttsInfo').textContent = '朗读中...';
}

function ttsStop() {
  ttsActive = false;
  ttsPaused = false;
  ttsIndex = -1;
  window.speechSynthesis.cancel();
  document.getElementById('ttsPlayBtn').textContent = '▶';
  document.getElementById('ttsPlayBtn').classList.remove('active');
  document.getElementById('ttsInfo').textContent = '已停止';
  clearHighlight();
  if (ttsTimer) { clearTimeout(ttsTimer); ttsTimer = null; }
}

function ttsPrev() {
  if (ttsIndex > 0) {
    ttsIndex--;
    window.speechSynthesis.cancel();
    speakCurrent();
  }
}

function ttsNext() {
  if (ttsIndex < ttsSentences.length - 1) {
    ttsIndex++;
    window.speechSynthesis.cancel();
    speakCurrent();
  } else {
    ttsStop();
    document.getElementById('ttsInfo').textContent = '✅ 朗读完毕';
  }
}

function ttsUpdateSpeed() {
  // speed will apply on next utterance
}

function speakCurrent() {
  if (ttsIndex < 0 || ttsIndex >= ttsSentences.length) {
    ttsStop();
    if (ttsIndex >= ttsSentences.length) document.getElementById('ttsInfo').textContent = '✅ 朗读完毕';
    return;
  }
  clearHighlight();
  const item = ttsSentences[ttsIndex];
  if (item.element) item.element.classList.add('tts-highlight');
  item.element.scrollIntoView({ behavior: 'smooth', block: 'center' });

  const utterance = new SpeechSynthesisUtterance(item.text);
  utterance.lang = 'zh-CN';
  utterance.rate = parseFloat(document.getElementById('ttsSpeed').value);
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;

  utterance.onend = () => {
    if (ttsActive && !ttsPaused) {
      ttsTimer = setTimeout(() => {
        ttsIndex++;
        speakCurrent();
      }, 300);
    }
  };
  utterance.onerror = () => {
    if (ttsActive) {
      ttsIndex++;
      speakCurrent();
    }
  };
  window.speechSynthesis.speak(utterance);
  document.getElementById('ttsInfo').textContent = `朗读进度：${ttsIndex + 1}/${ttsSentences.length}`;
}

function clearHighlight() {
  document.querySelectorAll('.tts-highlight').forEach(el => el.classList.remove('tts-highlight'));
}

window.addEventListener('scroll', () => {
  updateProgressBar();
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(saveProgress, 500);
});

window.speechSynthesis.onvoiceschanged = () => {
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  document.getElementById('ttsVoiceInfo').textContent = zhVoice ? `朗读音色：${zhVoice.name}` : '';
};

loadMarkedTopics();
render();
loadProgress();
updateProgressBar();
</script>
