<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中高考理科复习资料 - 知识框架</title>
<style>
:root {
  --bg: #f8f9fa;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text-secondary: #555;
  --primary: #4a6cf7;
  --primary-light: #e8edfe;
  --border: #e2e8f0;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --header-bg: rgba(255,255,255,0.92);
  --toc-bg: #fff;
  --tag-math: #3b82f6;
  --tag-physics: #10b981;
  --tag-chemistry: #f59e0b;
  --tag-biology: #ef4444;
  --tag-english: #8b5cf6;
  --progress-bar: #4a6cf7;
  --tts-active: #ef4444;
}
[data-theme="dark"] {
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --primary: #60a5fa;
  --primary-light: #1e293b;
  --border: #334155;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --header-bg: rgba(15,23,42,0.95);
  --toc-bg: #1e293b;
  --progress-bar: #60a5fa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  font-size: 16px;
  transition: background 0.3s, color 0.3s;
}
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.3s;
}
.header-title {
  font-size: 16px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 200px;
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.header-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.header-btn:hover { background: var(--primary-light); color: var(--primary); }
.header-btn.active { background: var(--tts-active); color: #fff; border-color: var(--tts-active); }
.progress-bar-wrap {
  position: fixed; top: 56px; left: 0; right: 0; z-index: 999;
  height: 3px; background: var(--border);
}
.progress-bar-fill {
  height: 100%; width: 0%;
  background: var(--progress-bar);
  transition: width 0.3s;
}
.main {
  max-width: 800px; margin: 80px auto 40px; padding: 0 16px;
}
.subject-section {
  margin-bottom: 28px;
}
.subject-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.subject-header:hover { opacity: 0.85; }
.subject-header .icon { font-size: 22px; }
.subject-header .title { font-size: 18px; font-weight: 700; flex: 1; }
.subject-header .arrow { font-size: 14px; transition: transform 0.3s; color: var(--text-secondary); }
.subject-header .arrow.open { transform: rotate(90deg); }
.subject-header .tag {
  font-size: 11px; padding: 2px 10px; border-radius: 20px;
  color: #fff; font-weight: 600;
}
.subject-content {
  display: none;
  padding: 4px 0;
}
.subject-content.open { display: block; }
.topic-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: background 0.3s, border-color 0.3s;
}
.topic-title {
  font-size: 15px; font-weight: 700;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.topic-title .priority {
  font-size: 11px; padding: 1px 8px; border-radius: 4px;
  font-weight: 600;
}
.priority-high { background: #fef2f2; color: #dc2626; }
.priority-mid { background: #fef9c3; color: #a16207; }
[data-theme="dark"] .priority-high { background: #450a0a; color: #fca5a5; }
[data-theme="dark"] .priority-mid { background: #422006; color: #fde68a; }
.topic-body { font-size: 14.5px; color: var(--text-secondary); }
.topic-body p { margin-bottom: 6px; }
.topic-body .highlight {
  background: var(--primary-light);
  padding: 1px 6px; border-radius: 3px;
  color: var(--primary); font-weight: 600;
}
.topic-body ul { padding-left: 18px; margin: 4px 0; }
.topic-body li { margin-bottom: 4px; }
.topic-card.marked {
  border-left: 3px solid #22c55e;
}
.topic-card.marked .topic-body {
  display: none;
}
.topic-card.marked .topic-title::after {
  content: ' (已掌握，点击展开)';
  font-size: 12px;
  color: #22c55e;
  font-weight: normal;
}
.mark-btn {
  float: right;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: all 0.2s;
}
.mark-btn:hover { background: #fef3c7; border-color: #f59e0b; }
.mark-btn.marked { background: #dcfce7; border-color: #22c55e; }
.toc-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
}
.toc-overlay.open { display: block; }
.toc-panel {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 2001;
  width: 300px; max-width: 80vw;
  background: var(--toc-bg);
  padding: 20px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.3s;
  border-right: 1px solid var(--border);
}
.toc-panel.open { transform: translateX(0); }
.toc-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--primary); }
.toc-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  margin-bottom: 4px;
}
.toc-item:hover { background: var(--primary-light); color: var(--primary); }
.toc-item .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.tts-bar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
  transition: background 0.3s;
}
.tts-bar.open { display: block; }
.tts-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; text-align: center; }
.tts-controls { display: flex; align-items: center; justify-content: center; gap: 12px; }
.tts-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.tts-btn:hover { background: var(--primary-light); color: var(--primary); }
.tts-btn.play { width: 48px; height: 48px; background: var(--primary); color: #fff; border-color: var(--primary); }
.tts-btn.play:hover { opacity: 0.85; }
.tts-btn.play.active { background: var(--tts-active); border-color: var(--tts-active); }
.tts-speed {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
}

.tts-speed select {
  padding: 2px 6px; border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 12px;
}
.tts-voice { font-size: 12px; color: var(--text-secondary); margin-top: 4px; text-align: center; }
.tts-highlight {
  background: #fef08a !important;
  border-radius: 2px;
  transition: background 0.1s;
}
[data-theme="dark"] .tts-highlight {
  background: #713f12 !important;
}
.read-progress-badge {
  position: fixed; bottom: 80px; right: 16px; z-index: 999;
  font-size: 11px; color: var(--text-secondary);
  background: var(--card-bg);
  padding: 6px 12px; border-radius: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  opacity: 0;
  transition: opacity 0.3s;
}
.read-progress-badge.show { opacity: 1; }
@media (max-width: 600px) {
  .main { padding: 0 12px; }
  .topic-card { padding: 14px 16px; }
  .subject-header { padding: 12px 16px; }
  .header-title { font-size: 14px; max-width: 140px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">📚 中高考复习资料</div>
  <div class="header-actions">
    <button class="header-btn" onclick="toggleTOC()" title="目录">☰</button>
    <button class="header-btn" onclick="toggleTTS()" title="语音朗读">🔊</button>
    <button class="header-btn" onclick="toggleTheme()" title="切换主题">🌓</button>
  </div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
<div class="toc-overlay" id="tocOverlay" onclick="toggleTOC()"></div>
<div class="toc-panel" id="tocPanel">
  <div class="toc-title">📑 目录</div>
  <div id="tocList"></div>
</div>
<div class="main" id="mainContent"></div>
<div class="tts-bar" id="ttsBar">
  <div class="tts-info" id="ttsInfo">选择一段文字开始朗读</div>
  <div class="tts-controls">
    <button class="tts-btn" onclick="ttsPrev()" title="上一句">⏮</button>
    <button class="tts-btn play" id="ttsPlayBtn" onclick="ttsToggle()" title="播放/暂停">▶</button>
    <button class="tts-btn" onclick="ttsNext()" title="下一句">⏭</button>
    <button class="tts-btn" onclick="ttsStop()" title="停止">⏹</button>
    <div class="tts-speed">
      <span>速度</span>
      <select id="ttsSpeed" onchange="ttsUpdateSpeed()">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
  </div>
  <div class="tts-voice" id="ttsVoiceInfo"></div>
</div>
<div class="read-progress-badge" id="progressBadge">已读 0%</div>
<script>
const DATA = [
  {
    id: "math", title: "数学", icon: "📐", color: "#3b82f6", tag: "数学", tagColor: "var(--tag-math)",
    topics: [
      { title: "集合的基本概念", priority: "high", items: [
        "集合的定义：由确定的、互不相同的元素组成的整体，常用大写字母A、B、C表示。",
        "元素的特性：确定性（元素是否属于集合是确定的）、互异性（集合中元素互不相同）、无序性（元素顺序无关）。",
        "常用数集：N（自然数集，含0）、N+（正整数集）、Z（整数集）、Q（有理数集）、R（实数集）。",
        "表示方法：列举法（{1,2,3}）、描述法（{x|x>0}）、韦恩图（用图形表示集合关系）。"
      ]},
      { title: "集合的运算", priority: "high", items: [
        "交集（∩）：A∩B={x|x∈A且x∈B}，即两个集合的公共元素，性质：A∩B=B∩A，A∩A=A，A∩∅=∅。",
        "并集（∪）：A∪B={x|x∈A或x∈B}，即两个集合的所有元素，性质：A∪B=B∪A，A∪A=A，A∪∅=A。",
        "补集（∁U）：∁UA={x|x∈U且x∉A}，即全集中不属于A的元素，性质：A∪∁UA=U，A∩∁UA=∅。",
        "差集（-）：A-B={x|x∈A且x∉B}，即属于A但不属于B的元素。"
      ]},
      { title: "区间表示法", priority: "mid", items: [
        "闭区间：[a,b]，表示a≤x≤b，包含端点a和b。",
        "开区间：(a,b)，表示a<x<b，不包含端点。",
        "半开半闭区间：[a,b)表示a≤x<b，(a,b]表示a<x≤b。",
        "无穷区间：[a,+∞)表示x≥a，(-∞,b]表示x≤b，(-∞,+∞)表示全体实数。"
      ]},
      { title: "函数的概念", priority: "high", items: [
        "函数定义：设A、B是非空数集，如果按照某种对应关系f，使对于集合A中的任意一个数x，在集合B中都有唯一确定的数f(x)和它对应，那么就称f:A→B为从集合A到集合B的一个函数。",
        "三要素：定义域（自变量x的取值范围）、值域（函数值y的取值范围）、对应关系（函数表达式）。",
        "表示方法：解析法（y=f(x)）、列表法、图像法。",
        "相等函数：定义域和对应关系都相同的两个函数相等，与函数名称无关。"
      ]},
      { title: "函数的定义域", priority: "high", items: [
        "分式函数：分母不能为0，如y=1/x中x≠0。",
        "偶次根式：被开方数非负，如y=√x中x≥0。",
        "对数函数：真数大于0，底数大于0且不等于1，如y=log₂x中x>0。",
        "零次幂：底数不能为0，如y=x⁰中x≠0。",
        "实际问题：结合实际意义确定定义域，如人数不能为负数。"
      ]},
      { title: "函数的值域", priority: "high", items: [
        "配方法：适用于二次函数，如y=x²-2x+3=(x-1)²+2≥2，值域为[2,+∞)。",
        "单调性法：根据函数单调性求值域，如y=x在R上单调递增。",
        "换元法：将复杂函数转化为简单函数，如y=x+√(x-1)，令t=√(x-1)≥0。",
        "不等式法：利用基本不等式a+b≥2√(ab)（a,b>0）求最值。"
      ]},
      { title: "函数的单调性", priority: "high", items: [
        "定义法：设x₁,x₂∈D，若x₁<x₂时恒有f(x₁)<f(x₂)，则f(x)在D上单调递增；若f(x₁)>f(x₂)，则单调递减。",
        "导数法：若f'(x)>0，则f(x)单调递增；若f'(x)<0，则f(x)单调递减。",
        "复合函数单调性：同增异减（内外函数单调性相同则增，不同则减）。",
        "常见结论：增+增=增，减+减=减，增-减=增，减-增=减。"
      ]},
      { title: "函数的奇偶性", priority: "high", items: [
        "判断前提：定义域关于原点对称，否则非奇非偶。",
        "偶函数：f(-x)=f(x)，图像关于y轴对称，如y=x²、y=|x|。",
        "奇函数：f(-x)=-f(x)，图像关于原点对称，如y=x³、y=sinx。",
        "重要性质：奇函数在x=0处有定义，则f(0)=0；偶函数的绝对值是偶函数。"
      ]},
      { title: "二次函数", priority: "high", items: [
        "一般式：y=ax²+bx+c（a≠0），a决定开口方向（a>0向上，a<0向下），a的绝对值越大开口越窄。",
        "顶点式：y=a(x-h)²+k，顶点坐标为(h,k)，对称轴为x=h。",
        "交点式：y=a(x-x₁)(x-x₂)，x₁、x₂是与x轴交点的横坐标。",
        "判别式：Δ=b²-4ac，Δ>0有两个不等实根，Δ=0有一个实根，Δ<0无实根。",
        "最值：a>0时，x=-b/(2a)时y有最小值(4ac-b²)/(4a)；a<0时，x=-b/(2a)时y有最大值。"
      ]},
      { title: "指数函数", priority: "high", items: [
        "定义：y=a^x（a>0且a≠1），定义域为R，值域为(0,+∞)。",
        "图像特征：恒过点(0,1)；a>1时单调递增，0<a<1时单调递减。",
        "运算性质：a^m·a^n=a^(m+n)，a^m÷a^n=a^(m-n)，(a^m)^n=a^(mn)，a^0=1（a≠0）。",
        "特殊值：a^(-n)=1/a^n，√a=a^(1/2)，a^(m/n)=ⁿ√(a^m)。"
      ]},
      { title: "对数函数", priority: "high", items: [
        "定义：y=log_a x（a>0且a≠1），定义域为(0,+∞)，值域为R。",
        "图像特征：恒过点(1,0)；a>1时单调递增，0<a<1时单调递减。",
        "运算性质：log_a(M·N)=log_aM+log_aN，log_a(M/N)=log_aM-log_aN，log_aM^n=nlog_aM。",
        "换底公式：log_ab=log_cb/log_ca，常用log_ab=ln b/ln a或log_ab=lg b/lg a。"
      ]},
      { title: "等差数列", priority: "high", items: [
        "定义：从第二项起，每一项与前一项的差为常数d（公差），即aₙ₊₁-aₙ=d。",
        "通项公式：aₙ=a₁+(n-1)d，已知首项a₁和公差d可求任意项。",
        "求和公式：Sₙ=n(a₁+aₙ)/2=na₁+n(n-1)d/2。",
        "重要性质：若m+n=p+q，则aₘ+aₙ=aₚ+a_q；连续k项的和成等差数列。"
      ]},
      { title: "等比数列", priority: "high", items: [
        "定义：从第二项起，每一项与前一项的比为常数q（公比），即aₙ₊₁/aₙ=q（q≠0）。",
        "通项公式：aₙ=a₁q^(n-1)，注意q≠0，a₁≠0。",
        "求和公式：q≠1时Sₙ=a₁(1-qⁿ)/(1-q)；q=1时Sₙ=na₁（常考q=1的特殊情况）。",
        "重要性质：若m+n=p+q，则aₘ·aₙ=aₚ·a_q；连续k项的和（不为0）成等比数列。"
      ]},
      { title: "概率基础", priority: "high", items: [
        "概率定义：事件发生的可能性大小，0≤P(A)≤1，必然事件P=1，不可能事件P=0。",
        "古典概型：满足有限性（基本事件有限个）和等可能性（每个基本事件概率相等），P(A)=事件A包含的基本事件数/总基本事件数。",
        "互斥事件：不能同时发生的事件，P(A∪B)=P(A)+P(B)。",
        "对立事件：A与∁UA，P(A)+P(∁UA)=1。"
      ]},
      { title: "统计", priority: "high", items: [
        "平均数：反映数据平均水平，¯x=(x₁+x₂+...+xₙ)/n。",
        "中位数：将数据从小到大排列后位于中间位置的数（n为奇数取中间，n为偶数取中间两数的平均）。",
        "众数：出现次数最多的数，可能有多个。",
        "方差：反映数据波动大小，s²=1/n[(x₁-¯x)²+(x₂-¯x)²+...+(xₙ-¯x)²]，方差越小数据越稳定。",
        "标准差：s=√s²，与数据单位相同，更易理解。"
      ]},
      { title: "排列组合", priority: "mid", items: [
        "排列（有序）：从n个不同元素中取k个排成一列，A(n,k)=n!/(n-k)!。",
        "组合（无序）：从n个不同元素中取k个组成一组，C(n,k)=n!/(k!(n-k)!)。",
        "乘法原理：分步完成，总方法数=各步方法数相乘。",
        "加法原理：分类完成，总方法数=各类方法数相加。"
      ]},
      { title: "立体几何", priority: "high", items: [
        "空间中的线线关系：平行（没有公共点）、相交（有一个公共点）、异面（不同在任何一个平面内）。",
        "线面平行判定：平面外一条直线与平面内一条直线平行，则线面平行。",

        "酸：电离时生成的阳离子全部是H+的化合物。强酸：HCl、H2SO4、HNO3；弱酸：CH3COOH、H2CO3。酸的通性：使指示剂变色、与金属、碱、盐、金属氧化物反应。",

        "化学用语：元素符号（H、O、Fe）；化学式（H2O、NaCl）；化学方程式（2H2+O2点燃2H2O）；离子符号（Na+、Cl-、SO42-）；电子式、结构式、结构简式。",
        "化合价：单质为零，化合物中正负化合价代数和为零。常见元素化合价：H+1、O-2、Na+1、Fe+2/+3、Cu+1/+2。"

      { title: "物质的量与化学计量", priority: "high", items: [

        "气体摩尔体积：Vm，标况下(0℃,101kPa)约为22.4L/mol。n=V/Vm，标况下气体体积÷22.4。注意：标况下非气态（如H2O、SO3、CCl4）不适用。",

      { title: "氧化还原反应", priority: "high", items: [
        "氧化还原反应本质：电子转移（得失或偏移）。特征：化合价升降。化合价升高→失电子→被氧化→还原剂→生成氧化产物；化合价降低→得电子→被还原→氧化剂→生成还原产物。",
        "升失氧还，降得还氧。双线桥法：从反应物指向生成物，标得失电子数。单线桥法：从还原剂指向氧化剂，标转移电子数。",
        "常见氧化剂：O2、Cl2、HNO3、浓硫酸、KMnO4、Fe3+；常见还原剂：活泼金属、C、H2、CO、Fe2+、S2-、I-。",
        "氧化还原反应配平：原则：电子守恒、质量守恒、电荷守恒。步骤：标变价→画双线→算得失→配系数。歧化反应：同一元素既升又降；归中反应：同一元素高低化合价靠拢。",
        "原电池：将化学能转化为电能的装置。负极：氧化反应，失电子；正极：还原反应，得电子。电子从负极流出，经外电路流向正极。如Zn-Cu原电池：Zn负，Cu正。",
        "电解池：将电能转化为化学能的装置。阳极：氧化反应（与电源正极相连）；阴极：还原反应（与电源负极相连）。电镀：镀层金属作阳极，镀件作阴极。"
      ]},
      { title: "离子反应与电解质", priority: "high", items: [
        "离子反应：在水溶液中或熔融状态下，有离子参加或生成的反应。复分解反应条件：生成沉淀、气体、水或弱电解质。",
        "离子方程式书写：写（化学方程式）→拆（强酸、强碱、可溶盐拆成离子）→删（删除不参加反应的离子）→查（原子守恒、电荷守恒）。注意：弱酸、弱碱、难溶物、氧化物、气体不能拆。",
        "离子共存：离子之间不发生反应则可共存。不能共存情况：生成沉淀（Ag+与Cl-、Ba2+与SO42-）、生成气体（H+与CO32-、HCO3-）、生成弱电解质（H+与OH-、CH3COO-）、发生氧化还原（Fe3+与I-、H+、NO3-与Fe2+）。",

        "强电解质：完全电离，强酸（HCl、H2SO4、HNO3）、强碱（NaOH、KOH、Ba(OH)2）、大部分盐（NaCl、KNO3）。",
        "弱电解质：部分电离，弱酸（CH3COOH、H2CO3、HClO）、弱碱（NH3·H2O、Cu(OH)2）、水。电离方程式：强电解质用=，弱电解质用⇌。"
      ]},
      { title: "物质结构与元素周期律", priority: "high", items: [
        "原子结构：原子由原子核（质子+中子）和核外电子组成。质量数=质子数+中子数。原子序数=核电荷数=质子数=核外电子数。",
        "核素：具有一定数目的质子和中子的一种原子。同位素：同种元素不同核素，如1H、2H、3H。同素异形体：同种元素不同单质，如O2和O3。",
        "核外电子排布：分层排布，每层最多排2n²个；最外层不超8（K层2）；次外层不超18。电子总是先排布在能量最低的轨道。",
        "元素周期表：周期（行）：7个周期，三短四长；族（列）：18列，16族（7主7副1零1Ⅷ）。主族序数=最外层电子数，周期序数=电子层数。",
        "元素周期律：同周期从左到右：原子半径减小，金属性减弱，非金属性增强；同主族从上到下：原子半径增大，金属性增强，非金属性减弱。",
        "金属性判断：与水/酸反应剧烈程度、最高价氧化物对应水化物碱性强弱、置换反应；非金属性判断：与氢气化合难易、气态氢化物稳定性、最高价氧化物对应水化物酸性强弱、置换反应。",
        "化学键：离子键（阴阳离子通过静电作用，活泼金属+活泼非金属）、共价键（原子通过共用电子对，非金属之间）。共价键分为极性（不同原子）和非极性（相同原子）。",
        "分子间作用力：比化学键弱，影响物质的熔沸点、溶解度。氢键（N、O、F与H之间）是特殊的分子间作用力，使物质熔沸点异常升高，如H2O、HF、NH3。"

      { title: "化学反应与能量", priority: "high", items: [

        "中和热：稀溶液中，强酸和强碱中和反应生成1mol水时放出的热量，约为-57.3kJ/mol。"

      { title: "化学反应速率与平衡", priority: "high", items: [

        "影响速率因素：浓度（增大浓度，速率加快）、温度（升高温度，速率加快，每升高10℃约加快2-4倍）、压强（有气体参与时，增大压强=增大浓度）、催化剂（加快速率，不改变平衡）、接触面积。",

        "勒夏特列原理：改变影响平衡的一个条件，平衡向减弱这种改变的方向移动。升高温度平衡向吸热方向移动；增大压强平衡向气体分子数减少方向移动；增大反应物浓度平衡向正反应方向移动。催化剂不改变平衡。",

      { title: "重要元素及化合物", priority: "high", items: [

        "金属铁：有变价，Fe+2H+=Fe2++H2↑（酸非强氧化性）。Fe2+（浅绿色）→Fe3+（黄色）：加氧化剂（Cl2、H2O2、HNO3）；Fe3+→Fe2+：加还原剂（Fe、Cu、I-）。Fe(OH)2白色沉淀→灰绿色→Fe(OH)3红褐色。Fe3O4有磁性。",

        "非金属氯：Cl2黄绿色有毒气体，溶于水：Cl2+H2O⇌HCl+HClO，HClO有强氧化性，能漂白。漂白液NaClO，漂白粉Ca(ClO)2和CaCl2。Cl-检验：加AgNO3生成不溶于稀HNO3的白色沉淀。",
        "非金属硫：S黄色固体，SO2有刺激性气味，能使品红褪色（加热恢复）。浓硫酸有吸水性、脱水性、强氧化性，常温下使Fe、Al钝化。SO42-检验：加稀盐酸酸化，再加BaCl2生成白色沉淀。",

      { title: "有机化学基础", priority: "high", items: [

        "甲烷CH4：正四面体结构，性质稳定，能燃烧，能发生取代反应（与Cl2光照），产物为CH3Cl、CH2Cl2、CHCl3、CCl4的混合物。",

        "乙酸CH3COOH：含羧基-COOH，俗称醋酸，有酸性（比碳酸强），能与乙醇酯化生成乙酸乙酯。",
        "酯：R-COO-R'，有芳香味，能水解。乙酸乙酯水解：酸性生成乙酸和乙醇；碱性生成乙酸钠和乙醇。",

        "有机高分子：加聚（乙烯→聚乙烯）、缩聚（氨基酸→蛋白质）。"

      { title: "化学实验基础", priority: "high", items: [
        "常见仪器：试管、烧杯、烧瓶、量筒、容量瓶、分液漏斗、冷凝管、坩埚、蒸发皿、酒精灯、天平、滴定管、pH试纸、玻璃棒等。",
        "药品取用：固体用药匙或镊子，液体用胶头滴管或倾倒。注意节约（一般1-2mL液体，盖满试管底部固体），剩余药品不能放回原瓶（Na、K等除外）。",

        "蒸发：用玻璃棒搅拌，防止局部过热，接近蒸干时停止加热，利用余热蒸干。",

  {
    id: "biology", title: "生物", icon: "🧬", color: "#ef4444", tag: "生物", tagColor: "var(--tag-biology)",
    topics: [
      { title: "细胞的物质基础与结构", priority: "high", items: [
        "组成细胞的元素：大量元素C、H、O、N、P、S、K、Ca、Mg；微量元素Fe、Mn、Zn、Cu、B、Mo。C是最基本元素，生物大分子以碳链为骨架。",
        "组成细胞的化合物：无机物（水、无机盐）和有机物（糖类、脂质、蛋白质、核酸）。水：自由水（良好溶剂、参与反应、运输物质）和结合水（细胞结构重要成分）。代谢旺盛时自由水比例高。",
        "无机盐：多以离子形式存在。功能：构成复杂化合物（Mg→叶绿素、Fe→血红蛋白、P→ATP、I→甲状腺激素）、维持生命活动（Ca2+抽搐）、维持渗透压和酸碱平衡。",
        "糖类：主要能源物质。单糖（葡萄糖、果糖、核糖、脱氧核糖）；二糖（蔗糖、麦芽糖、乳糖）；多糖（淀粉→植物储能、糖原→动物储能、纤维素→植物细胞壁）。葡萄糖是细胞生命活动的主要能源物质。",
        "脂质：脂肪（储能、保温、缓冲）、磷脂（生物膜主要成分）、固醇（胆固醇→动物细胞膜、性激素→调节、维生素D→促进钙吸收）。",
        "蛋白质：生命活动的主要承担者。基本单位：氨基酸，约20种，结构通式：至少一个氨基和羧基连在同一个C上。氨基酸通过脱水缩合形成肽键。结构多样性：氨基酸种类、数目、排列顺序、肽链空间结构。功能：结构蛋白、催化（酶）、运输（血红蛋白）、调节（激素）、免疫（抗体）。",
        "核酸：遗传信息的携带者。基本单位：核苷酸（磷酸+五碳糖+含氮碱基）。DNA（脱氧核糖核酸，双螺旋，脱氧核糖、ATCG）主要在细胞核；RNA（核糖核酸，单链，核糖、AUCG）主要在细胞质。功能：DNA储存传递遗传信息，RNA参与遗传信息表达。",
        "细胞学说：施莱登、施旺。主要内容：细胞是生物结构和功能的基本单位，新细胞从老细胞产生。揭示细胞统一性和生物体结构统一性。",
        "原核细胞与真核细胞：主要区别有无核膜包被的细胞核。原核：细菌、蓝藻（蓝细菌）、支原体、衣原体；真核：动植物、真菌。原核无核仁、无染色体，只有核糖体一种细胞器。蓝藻能光合作用（含藻蓝素和叶绿素）。",
        "细胞膜：主要成分脂质（磷脂双分子层基本骨架）、蛋白质（功能体现）、少量糖类。功能：将细胞与外界隔开、控制物质进出、信息交流。结构特点：一定流动性；功能特点：选择透过性。",
        "细胞器：线粒体（有氧呼吸主要场所，动力车间，双层膜）、叶绿体（光合作用场所，养料制造车间，双层膜，植物特有）、核糖体（蛋白质合成，无膜）、内质网（蛋白质加工，脂质合成）、高尔基体（加工分类包装蛋白质，植物细胞壁形成）、液泡（植物细胞特有，调节内环境）、溶酶体（消化车间）、中心体（动物和低等植物特有，与有丝分裂有关）。",
        "细胞核：遗传信息库，控制代谢和遗传。结构：核膜（双层膜，核孔物质交换）、核仁（与rRNA和核糖体形成有关）、染色质（DNA+蛋白质，与染色体是同一物质不同时期）。"
      ]},
      { title: "物质进出细胞与细胞代谢", priority: "high", items: [
        "物质跨膜运输方式：被动运输（顺浓度梯度，不耗能）→自由扩散（O2、CO2、水、甘油、乙醇，不需载体）、协助扩散（葡萄糖进红细胞，需载体）；主动运输（逆浓度梯度，耗能需载体，如K+、Na+、葡萄糖、氨基酸）；胞吞胞吐（大分子，如分泌蛋白，耗能，依赖膜流动性）。",
        "渗透作用：水分子从低浓度溶液向高浓度溶液扩散。条件：半透膜、浓度差。动物细胞失水皱缩、吸水膨胀甚至涨破；植物细胞有细胞壁，不会涨破，会发生质壁分离（细胞壁与原生质层分离）和质壁分离复原。",
        "酶：活细胞产生的具有催化作用的有机物，大多数是蛋白质，少数是RNA。特性：高效性（比无机催化剂效率高）、专一性、作用条件温和（适宜温度、pH）。温度和pH影响酶活性，过高过慢或过酸过碱都会使酶失活（破坏空间结构，不可逆）。",
        "ATP：三磷酸腺苷，结构A-P~P~P，是细胞直接能源物质。ATP和ADP相互转化：ATP水解释放能量用于生命活动，合成ATP的能量来源：植物光合作用和呼吸作用，动物呼吸作用。",
        "细胞呼吸：有机物在细胞内氧化分解，释放能量。有氧呼吸：第一阶段（细胞质基质，葡萄糖→丙酮酸+[H]+少量ATP）；第二阶段（线粒体基质，丙酮酸+H2O→CO2+[H]+少量ATP）；第三阶段（线粒体内膜，[H]+O2→H2O+大量ATP）。总反应：C6H12O6+6O2+6H2O→6CO2+12H2O+能量。",
        "无氧呼吸：不彻底氧化。场所细胞质基质。产物：酒精+CO2（植物、酵母菌）或乳酸（动物、乳酸菌、马铃薯块茎）。第一阶段与有氧呼吸相同。酒精发酵：酿酒；乳酸发酵：酸奶、泡菜。",
        "光合作用：绿色植物通过叶绿体，利用光能，把CO2和H2O转化为储存能量的有机物，释放O2。场所：叶绿体类囊体薄膜（光反应）和基质（暗反应）。",
        "光反应阶段：需要光，类囊体上进行。水的光解：2H2O→4[H]+O2；ATP合成：ADP+Pi+能量→ATP。产物：[H]、ATP、O2。光能→ATP中活跃化学能。",
        "暗反应阶段：不需要光，但需要光反应提供的[H]和ATP。CO2固定：CO2+C5→2C3；C3还原：2C3→(CH2O)+C5（需要[H]、ATP、酶）。产物：有机物（糖类）。活跃化学能→稳定化学能。",
        "影响光合作用的因素：光照强度、CO2浓度、温度、水、矿质元素。光合午休：夏季中午温度高，气孔关闭，CO2供应不足，光合速率下降。",
        "化能合成作用：少数细菌（如硝化细菌）利用化学能把CO2和H2O合成有机物，属于自养生物。"
      ]},
      { title: "细胞的生命历程", priority: "high", items: [
        "细胞增殖：体细胞增殖的主要方式是有丝分裂。细胞周期：连续分裂的细胞从一次分裂完成开始，到下一次分裂完成结束。分为间期（G1、S、G2，DNA复制和蛋白质合成，时间长）和分裂期（前期、中期、后期、末期）。",
        "有丝分裂各期特点：前期：核膜核仁消失，纺锤体染色体出现；中期：染色体形态稳定数目清晰，着丝点排列在赤道板上（观察最佳时期）；后期：着丝点分裂，姐妹染色单体分开，染色体数目加倍；末期：核膜核仁重建，细胞一分为二（植物形成细胞板，动物缢裂）。",
        "染色体、染色单体、DNA数目变化：间期DNA复制，DNA加倍，染色单体出现；后期着丝点分裂，染色体加倍，染色单体消失；末期细胞一分为二，DNA和染色体数恢复。",
        "减数分裂：产生生殖细胞（精子、卵细胞）的分裂方式。特点：DNA复制一次，细胞分裂两次，结果染色体数减半。过程：减数第一次分裂（同源染色体分离）、减数第二次分裂（姐妹染色单体分离）。",
        "重要概念：同源染色体（形态大小一般相同，一条父一条母）、联会（同源染色体配对）、四分体（联会的一对同源染色体含4条染色单体）、交叉互换（同源染色体之间交换片段，基因重组）。",
        "受精作用：精子和卵细胞结合成受精卵的过程。恢复体细胞染色体数，一半来自父，一半来自母（细胞质DNA主要来自母）。",
        "细胞分化：个体发育中，相同细胞后代，形态结构生理功能发生稳定差异的过程。实质：基因选择性表达。特点：持久性、不可逆性、普遍性。细胞全能性：已分化细胞仍具有发育成完整个体的潜能。植物体细胞全能性，动物细胞核全能性。",
        "细胞衰老：特征：细胞体积变小，细胞核体积增大，染色质收缩，酶活性降低，代谢减慢，色素积累，细胞膜通透性改变。",
        "细胞凋亡：由基因决定的细胞自动结束生命的过程，编程性死亡。如蝌蚪尾巴消失、胎儿手形成。对生物体有利。",
        "细胞癌变：细胞增殖失控。原因：原癌基因和抑癌基因突变。癌细胞特点：无限增殖、形态结构改变、细胞膜表面糖蛋白减少（黏着性降低，易扩散转移）。致癌因子：物理（射线）、化学（亚硝胺）、病毒。"
      ]},
      { title: "遗传的细胞基础与分子基础", priority: "high", items: [
        "DNA是主要遗传物质的证据：肺炎双球菌转化实验（格里菲斯→S型有转化因子，艾弗里→DNA是转化因子）；噬菌体侵染细菌实验（赫尔希蔡斯→用35S标蛋白质、32P标DNA，DNA进入宿主细胞）。DNA是主要遗传物质，少数病毒（烟草花叶病毒、HIV）以RNA为遗传物质。",
        "DNA结构：沃森和克里克提出双螺旋结构。两条链反向平行；脱氧核糖和磷酸交替连接在外侧，构成基本骨架；碱基对在内，A-T配对（两个氢键），G-C配对（三个氢键）。结构特点：稳定性、多样性、特异性。",
        "DNA复制：半保留复制，边解旋边复制。时期：有丝分裂间期和减数第一次分裂前的间期。条件：模板（DNA两条链）、原料（4种脱氧核苷酸）、酶（解旋酶、DNA聚合酶等）、能量（ATP）。意义：保持遗传信息的连续性。",
        "基因与DNA的关系：基因是有遗传效应的DNA片段。DNA上有多个基因。",
        "基因的表达：包括转录和翻译。转录：以DNA一条链为模板合成RNA，主要在细胞核。翻译：以mRNA为模板合成蛋白质，在细胞质核糖体。",
        "转录：DNA解旋，RNA聚合酶以一条链为模板，按A-U、T-A、C-G、G-C配对合成mRNA。mRNA从核孔进入细胞质。",
        "翻译：模板mRNA，原料氨基酸，工具tRNA（转运氨基酸，识别密码子）。密码子：mRNA上3个相邻碱基，决定一个氨基酸，共64种，61种编码，3种终止密码子。反密码子：tRNA上与密码子互补的3个碱基。",
        "中心法则：DNA→DNA（复制）、DNA→RNA（转录）、RNA→蛋白质（翻译）、RNA→RNA（复制，某些病毒）、RNA→DNA（逆转录，HIV等）。",
        "基因控制性状的方式：直接控制（控制蛋白质结构），间接控制（控制酶的合成来控制代谢）。性状由基因决定，还受环境影响。",
        "基因突变：DNA分子中碱基对的增添、缺失、替换，引起基因结构改变。时期：DNA复制时（有丝分裂间期、减前间期）。特点：普遍性、随机性、不定向性、低频性、多害少利性。意义：生物变异的根本来源，为进化提供最初原材料。",
        "基因重组：生物体进行有性生殖时，控制不同性状的基因重新组合。类型：减数分裂时非同源染色体上非等位基因自由组合、同源染色体交叉互换。意义：生物变异的重要来源，有利于进化。",
        "染色体变异：结构变异（缺失、重复、易位、倒位）、数目变异（个别染色体增减，如21三体综合征；染色体组增减，如三倍体无子西瓜）。染色体组：一组非同源染色体，形态功能不同，携带全套遗传信息。",
        "人类遗传病：单基因（白化病、色盲）、多基因（高血压、糖尿病）、染色体异常（21三体综合征、猫叫综合征）。预防：遗传咨询、产前诊断。"
      ]},
      { title: "遗传的基本规律", priority: "high", items: [
        "孟德尔豌豆杂交实验成功原因：自花传粉闭花授粉，自然状态是纯种；相对性状易区分；先研究一对再两对；用统计学分析。",
        "一对相对性状杂交：P高茎×矮茎→F1全高茎→F2高:矮=3:1。解释：性状由遗传因子（基因）控制，体细胞中成对存在，形成配子时分离，受精时随机结合。",
        "分离定律：在杂合子细胞中，位于一对同源染色体上的等位基因具有独立性；减数分裂时，等位基因随同源染色体分开而分离，进入不同配子。实质：等位基因分离。",
        "验证：测交（F1与隐性纯合子杂交），后代1:1。",
        "两对相对性状杂交：P黄圆×绿皱→F1黄圆→F2黄圆:黄皱:绿圆:绿皱=9:3:3:1。解释：每对性状遵守分离定律，两对之间自由组合。",
        "自由组合定律：位于非同源染色体上的非等位基因分离或组合互不干扰；减数分裂时，等位基因分离，非同源染色体上非等位基因自由组合。实质：非等位基因自由组合。",
        "验证：测交，后代1:1:1:1。",
        "显隐性判断：具有相对性状的纯合亲本杂交，F1表现为显性；自交后代性状分离，亲本性状为显性。",
        "基因型与表现型：表现型=基因型+环境。纯合子：自交后代不发生性状分离；杂合子：自交后代性状分离。",
        "伴性遗传：基因位于性染色体上，遗传与性别相关联。X染色体隐性遗传：红绿色盲、血友病，特点：男患多于女患，隔代交叉遗传，女病父必病子必病。X染色体显性遗传：抗维生素D佝偻病，特点：女患多于男患，世代连续，父病女必病。Y染色体遗传：只传男，外耳道多毛症。",
        "遗传系谱图分析：先判断显隐性，再判断基因位置。口诀：无中生有是隐性，隐性看女病，女病父正非伴性；有中生无是显性，显性看男病，男病母正非伴性。"
      ]},
      { title: "内环境稳态与调节", priority: "high", items: [
        "内环境：细胞外液构成的液体环境，包括血浆、组织液、淋巴。是细胞直接生活的环境。内环境成分：水、无机盐、蛋白质、营养物质、代谢废物、激素等。",
        "内环境稳态：内环境的成分和理化性质（渗透压、pH、温度）保持相对稳定。稳态是机体进行正常生命活动的必要条件。调节机制：神经-体液-免疫调节网络。",
        "神经调节：基本方式反射，结构基础反射弧（感受器→传入神经→神经中枢→传出神经→效应器）。",
        "兴奋在神经纤维上的传导：双向传导。静息电位：外正内负（K+外流）；动作电位：外负内正（Na+内流）。以电信号（神经冲动、局部电流）形式传导。",
        "兴奋在神经元之间的传递：单向传递，只能从突触前膜到突触后膜。突触：突触前膜、突触间隙、突触后膜。递质由突触前膜释放，与突触后膜受体结合，引起下一个神经元兴奋或抑制。",
        "神经系统的分级调节：大脑皮层高级中枢，脊髓低级中枢。高级中枢对低级中枢有控制作用。",
        "人脑高级功能：语言（W写、V读、S说、H听）、学习、记忆、思维。",
        "体液调节：某些化学物质（激素、CO2等）通过体液运输，对生命活动进行调节。主要方式是激素调节。",
        "人体主要内分泌腺和激素：下丘脑（促激素释放激素、抗利尿激素）、垂体（促激素、生长激素）、甲状腺（甲状腺激素→促进代谢和发育）、肾上腺（肾上腺素→升血糖、应激）、胰岛（胰岛素→降血糖、胰高血糖素→升血糖）、性腺（性激素）。",
        "激素调节特点：微量高效、通过体液运输、作用于靶器官靶细胞。",
        "反馈调节：正反馈（加强，如排尿、分娩）、负反馈（维持稳态，如甲状腺激素过多抑制下丘脑和垂体）。",
        "血糖调节：来源：食物消化吸收、肝糖原分解、非糖物质转化；去路：氧化分解、合成糖原、转化为非糖。调节：胰岛素（降血糖）和胰高血糖素（升血糖）相互拮抗。",
        "体温调节：寒冷环境→皮肤血管收缩、汗腺分泌减少、骨骼肌战栗、肾上腺素甲状腺素分泌增加→产热增加散热减少。热环境相反。",
        "水盐调节：缺水时→下丘脑渗透压感受器→垂体释放抗利尿激素→肾小管集合管重吸收水→尿量减少。同时大脑皮层产生渴觉。",
        "免疫调节：三道防线：第一道（皮肤、黏膜）、第二道（体液中的杀菌物质和吞噬细胞）、第三道（特异性免疫，体液免疫和细胞免疫）。",
        "体液免疫：抗原→吞噬细胞→T细胞→B细胞→浆细胞→抗体，抗体与抗原结合；同时形成记忆细胞。",
        "细胞免疫：抗原→吞噬细胞→T细胞→效应T细胞，效应T细胞使靶细胞裂解死亡；同时形成记忆细胞。",
        "免疫异常：过敏反应（再次接触过敏原）、自身免疫病（类风湿、系统性红斑狼疮，免疫系统攻击自身组织）、免疫缺陷病（AIDS，HIV攻击T细胞）。"
      ]},
      { title: "植物激素调节", priority: "high", items: [
        "生长素的发现：达尔文实验（感受光刺激在尖端）、鲍森詹森、拜尔、温特（证明是化学物质，命名生长素）。生长素本质是吲哚乙酸IAA。",
        "生长素的产生：幼嫩芽、叶和发育中的种子。运输：极性运输（从形态学上端到下端）、横向运输（尖端，如向光侧到背光侧）。分布：生长旺盛部位。",
        "生长素的作用：促进生长，两重性（低促高抑）。同一植株不同器官对生长素敏感性不同：根>芽>茎。实例：根的向地性（近地侧浓度高抑制）、顶端优势（顶芽优先生长，侧芽抑制，可通过打顶解除）。",
        "其他植物激素：赤霉素（促进细胞伸长、促进种子萌发）、细胞分裂素（促进细胞分裂）、脱落酸（抑制分裂，促进衰老脱落）、乙烯（促进果实成熟）。",
        "植物生长调节剂：人工合成的类似植物激素作用的物质，如2,4-D（生长素类似物，可促进扦插生根、除双子叶杂草）。"
      ]},
      { title: "种群和群落", priority: "high", items: [
        "种群：在一定自然区域内，同种生物的全部个体。种群特征：种群密度（最基本）、出生率死亡率、迁入率迁出率、年龄组成（增长型、稳定型、衰退型）、性别比例。",

let currentSubject = null;
let ttsActive = false;
let ttsPaused = false;
let ttsUtterance = null;
let ttsSentences = [];
let ttsIndex = -1;
let ttsTimer = null;

let markedTopics = {};

function loadMarkedTopics() {
  const saved = localStorage.getItem('markedTopics');
  if (saved) {
    try {
      markedTopics = JSON.parse(saved);
    } catch(e) {}
  }
}

function saveMarkedTopics() {
  localStorage.setItem('markedTopics', JSON.stringify(markedTopics));
}

function toggleMark(si, ti) {
  const key = `${si}-${ti}`;
  markedTopics[key] = !markedTopics[key];
  saveMarkedTopics();
  const card = document.getElementById(`card-${si}-${ti}`);
  const btn = document.getElementById(`mark-btn-${si}-${ti}`);
  if (markedTopics[key]) {
    card.classList.add('marked');
    btn.classList.add('marked');
    btn.innerHTML = '✓';
  } else {
    card.classList.remove('marked');
    btn.classList.remove('marked');
    btn.innerHTML = '☆';
  }
}

function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  DATA.forEach((subject, si) => {
    const section = document.createElement('div');
    section.className = 'subject-section';
    section.dataset.subject = subject.id;

    const header = document.createElement('div');
    header.className = 'subject-header';
    header.style.background = `linear-gradient(135deg, ${subject.color}22, ${subject.color}11)`;
    header.style.borderLeft = `4px solid ${subject.color}`;
    header.innerHTML = `<span class="icon">${subject.icon}</span><span class="title">${subject.title}</span><span class="tag" style="background:${subject.tagColor}">${subject.tag}</span><span class="arrow">▶</span>`;
    header.onclick = () => toggleSubject(si);
    section.appendChild(header);

    const content = document.createElement('div');
    content.className = 'subject-content';
    content.id = `subject-${si}`;

    subject.topics.forEach((topic, ti) => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.id = `card-${si}-${ti}`;
      const isMarked = markedTopics[`${si}-${ti}`];
      if (isMarked) card.classList.add('marked');

      const titleDiv = document.createElement('div');
      titleDiv.className = 'topic-title';
      const pri = topic.priority === 'high' ? 'priority-high' : 'priority-mid';
      const priLabel = topic.priority === 'high' ? '★ 必考' : '📌 常考';
      titleDiv.innerHTML = `${topic.title} <span class="priority ${pri}">${priLabel}</span>`;

      const markBtn = document.createElement('button');
      markBtn.className = 'mark-btn';
      markBtn.id = `mark-btn-${si}-${ti}`;
      markBtn.innerHTML = isMarked ? '✓' : '☆';
      if (isMarked) markBtn.classList.add('marked');
      markBtn.title = '标记已掌握';
      markBtn.onclick = (e) => { e.stopPropagation(); toggleMark(si, ti); };
      titleDiv.appendChild(markBtn);

      card.appendChild(titleDiv);

      const body = document.createElement('div');
      body.className = 'topic-body';
      topic.items.forEach(item => {
        const p = document.createElement('p');
        p.textContent = item;
        p.dataset.tts = item;
        p.style.cursor = 'pointer';
        p.onclick = () => startTTSFromItem(p);
        body.appendChild(p);
      });
      card.appendChild(body);
      
      // Make the whole card clickable to toggle
      card.onclick = () => {
        if (card.classList.contains('marked')) {
          card.classList.remove('marked');
        }
      };

      content.appendChild(card);
    });

    section.appendChild(content);
    main.appendChild(section);
  });

  renderTOC();
}

function toggleSubject(si) {
  const content = document.getElementById(`subject-${si}`);
  const section = content.closest('.subject-section');
  const arrow = section.querySelector('.arrow');
  const isOpen = content.classList.contains('open');

  document.querySelectorAll('.subject-content').forEach(c => {
    c.classList.remove('open');
    c.closest('.subject-section').querySelector('.arrow').classList.remove('open');
  });

  if (!isOpen) {
    content.classList.add('open');
    arrow.classList.add('open');
    currentSubject = si;
  } else {
    currentSubject = null;
  }
}

function renderTOC() {
  const list = document.getElementById('tocList');
  list.innerHTML = '';
  DATA.forEach((subject, si) => {
    const item = document.createElement('div');
    item.className = 'toc-item';
    item.innerHTML = `<span class="dot" style="background:${subject.color}"></span><span>${subject.icon} ${subject.title}</span>`;
    item.onclick = () => {
      toggleTOC();
      const section = document.querySelector(`[data-subject="${subject.id}"]`);
      section.scrollIntoView({ behavior: 'smooth' });
      toggleSubject(si);
    };
    list.appendChild(item);
  });
}

function toggleTOC() {
  const overlay = document.getElementById('tocOverlay');
  const panel = document.getElementById('tocPanel');
  const isOpen = overlay.classList.contains('open');
  if (isOpen) {
    overlay.classList.remove('open');
    panel.classList.remove('open');
  } else {
    overlay.classList.add('open');
    panel.classList.add('open');
  }
}

function toggleTheme() {
  const html = document.documentElement;
  if (html.dataset.theme === 'dark') {
    html.dataset.theme = 'light';
    localStorage.setItem('theme', 'light');
  } else {
    html.dataset.theme = 'dark';
    localStorage.setItem('theme', 'dark');
  }
}

function loadTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
  }
}

function saveProgress() {
  localStorage.setItem('scrollPos', window.scrollY);
  localStorage.setItem('currentSubject', JSON.stringify(currentSubject));
}

function loadProgress() {
  const saved = localStorage.getItem('scrollPos');
  const subj = localStorage.getItem('currentSubject');
  if (subj) {
    try {
      const si = JSON.parse(subj);
      if (si !== null && si !== undefined) {
        setTimeout(() => toggleSubject(si), 100);
      }
    } catch(e) {}
  }
  if (saved) {
    const pos = parseInt(saved, 10);
    setTimeout(() => window.scrollTo(0, pos), 150);
  }
}

function updateProgressBar() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  document.getElementById('progressFill').style.width = `${progress}%`;
  const badge = document.getElementById('progressBadge');
  badge.textContent = `已读 ${Math.round(progress)}%`;
  badge.classList.add('show');
}

function toggleTTS() {
  const bar = document.getElementById('ttsBar');
  const btn = document.querySelector('.header-btn:nth-child(2)');
  if (ttsActive) {
    ttsStop();
  } else {
    bar.classList.add('open');
    btn.classList.add('active');
    collectTTS();
  }
}

function collectTTS() {
  ttsSentences = [];
  
  document.querySelectorAll('.topic-card').forEach(card => {
    if (!card.classList.contains('marked')) {
      card.querySelectorAll('.topic-body p[data-tts]').forEach(p => {
        ttsSentences.push({ element: p, text: p.dataset.tts });
      });
    }
  });
  
  if (ttsSentences.length > 0) {
    ttsIndex = 0;
    ttsActive = true;
    ttsPaused = false;
    speakCurrent();
  } else {
    document.getElementById('ttsInfo').textContent = '没有可朗读的内容（所有内容都已标记为已掌握）';
  }
}

function startTTSFromItem(element) {
  ttsStop();
  const text = element.dataset.tts;
  const index = ttsSentences.findIndex(s => s.element === element);
  
  if (index === -1) {
    // 重新收集所有内容
    collectTTS();
    const newIndex = ttsSentences.findIndex(s => s.element === element);
    if (newIndex !== -1) {
      ttsIndex = newIndex;
      ttsActive = true;
      ttsPaused = false;
      document.getElementById('ttsBar').classList.add('open');
      document.querySelector('.header-btn:nth-child(2)').classList.add('active');
      speakCurrent();
    }
  } else {
    ttsIndex = index;
    ttsActive = true;
    ttsPaused = false;
    document.getElementById('ttsBar').classList.add('open');
    document.querySelector('.header-btn:nth-child(2)').classList.add('active');
    speakCurrent();
  }
}

function ttsToggle() {
  if (!ttsActive && ttsSentences.length === 0) {
    collectTTS();
    return;
  }
  if (ttsPaused) {
    ttsPaused = false;
    document.getElementById('ttsPlayBtn').textContent = '❚❚';
    document.getElementById('ttsPlayBtn').classList.add('active');
    speakCurrent();
  } else if (ttsActive) {
    ttsPaused = true;
    window.speechSynthesis.pause();
    document.getElementById('ttsPlayBtn').textContent = '▶';
    document.getElementById('ttsPlayBtn').classList.remove('active');
  }
}

function ttsStop() {
  ttsActive = false;
  ttsPaused = false;
  ttsIndex = -1;
  window.speechSynthesis.cancel();
  document.getElementById('ttsBar').classList.remove('open');
  document.querySelector('.header-btn:nth-child(2)').classList.remove('active');
  document.getElementById('ttsPlayBtn').textContent = '▶';
  document.getElementById('ttsPlayBtn').classList.remove('active');
  document.getElementById('ttsInfo').textContent = '选择一段文字开始朗读';
  clearHighlight();
  if (ttsTimer) { clearTimeout(ttsTimer); ttsTimer = null; }
}

function ttsPrev() {
  if (ttsIndex > 0) {
    ttsIndex--;
    window.speechSynthesis.cancel();
    speakCurrent();
  }
}

function ttsNext() {
  if (ttsIndex < ttsSentences.length - 1) {
    ttsIndex++;
    window.speechSynthesis.cancel();
    speakCurrent();
  } else {
    ttsStop();
    document.getElementById('ttsInfo').textContent = '✅ 朗读完毕';
  }
}

function ttsUpdateSpeed() {
  // Speed is read when speaking
}

function speakCurrent() {
  if (ttsIndex < 0 || ttsIndex >= ttsSentences.length) {
    ttsStop();
    if (ttsIndex >= ttsSentences.length) document.getElementById('ttsInfo').textContent = '✅ 朗读完毕';
    return;
  }
  clearHighlight();
  const item = ttsSentences[ttsIndex];
  if (item.element) item.element.classList.add('tts-highlight');
  item.element.scrollIntoView({ behavior: 'smooth', block: 'center' });

  const utterance = new SpeechSynthesisUtterance(item.text);
  utterance.lang = 'zh-CN';
  utterance.rate = parseFloat(document.getElementById('ttsSpeed').value);
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;

  utterance.onend = () => {
    if (ttsActive && !ttsPaused) {
      ttsTimer = setTimeout(() => {
        ttsIndex++;
        speakCurrent();
      }, 300);
    }
  };
  utterance.onerror = () => {
    if (ttsActive) {
      ttsIndex++;
      speakCurrent();
    }
  };
  window.speechSynthesis.speak(utterance);
  document.getElementById('ttsInfo').textContent = `朗读进度：${ttsIndex + 1}/${ttsSentences.length}`;
  document.getElementById('ttsPlayBtn').textContent = '❚❚';
  document.getElementById('ttsPlayBtn').classList.add('active');
}

function clearHighlight() {
  document.querySelectorAll('.tts-highlight').forEach(el => el.classList.remove('tts-highlight'));
}

window.addEventListener('scroll', () => {
  updateProgressBar();
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(saveProgress, 500);
});

window.speechSynthesis.onvoiceschanged = () => {
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  document.getElementById('ttsVoiceInfo').textContent = zhVoice ? `朗读音色：${zhVoice.name}` : '';
};

loadTheme();
loadMarkedTopics();
render();
loadProgress();
updateProgressBar();
</script>
