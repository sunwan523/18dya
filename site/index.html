<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中高考理科复习资料 - 知识框架</title>
<style>
:root {
  --bg: #f8f9fa;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text-secondary: #555;
  --primary: #4a6cf7;
  --primary-light: #e8edfe;
  --border: #e2e8f0;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --header-bg: rgba(255,255,255,0.92);
  --toc-bg: #fff;
  --tag-math: #3b82f6;
  --tag-physics: #10b981;
  --tag-chemistry: #f59e0b;
  --tag-biology: #ef4444;
  --tag-english: #8b5cf6;
  --progress-bar: #4a6cf7;
  --tts-active: #ef4444;
}
[data-theme="dark"] {
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --primary: #60a5fa;
  --primary-light: #1e293b;
  --border: #334155;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --header-bg: rgba(15,23,42,0.95);
  --toc-bg: #1e293b;
  --progress-bar: #60a5fa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  font-size: 16px;
  transition: background 0.3s, color 0.3s;
}
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.3s;
}
.header-title {
  font-size: 16px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 200px;
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.header-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.header-btn:hover { background: var(--primary-light); color: var(--primary); }
.header-btn.active { background: var(--tts-active); color: #fff; border-color: var(--tts-active); }
.progress-bar-wrap {
  position: fixed; top: 56px; left: 0; right: 0; z-index: 999;
  height: 3px; background: var(--border);
}
.progress-bar-fill {
  height: 100%; width: 0%;
  background: var(--progress-bar);
  transition: width 0.3s;
}
.main {
  max-width: 800px; margin: 80px auto 40px; padding: 0 16px;
}
.subject-section {
  margin-bottom: 28px;
}
.subject-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.subject-header:hover { opacity: 0.85; }
.subject-header .icon { font-size: 22px; }
.subject-header .title { font-size: 18px; font-weight: 700; flex: 1; }
.subject-header .arrow { font-size: 14px; transition: transform 0.3s; color: var(--text-secondary); }
.subject-header .arrow.open { transform: rotate(90deg); }
.subject-header .tag {
  font-size: 11px; padding: 2px 10px; border-radius: 20px;
  color: #fff; font-weight: 600;
}
.subject-content {
  display: none;
  padding: 4px 0;
}
.subject-content.open { display: block; }
.topic-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: background 0.3s, border-color 0.3s;
}
.topic-title {
  font-size: 15px; font-weight: 700;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.topic-title .priority {
  font-size: 11px; padding: 1px 8px; border-radius: 4px;
  font-weight: 600;
}
.priority-high { background: #fef2f2; color: #dc2626; }
.priority-mid { background: #fef9c3; color: #a16207; }
[data-theme="dark"] .priority-high { background: #450a0a; color: #fca5a5; }
[data-theme="dark"] .priority-mid { background: #422006; color: #fde68a; }
.topic-body { font-size: 14.5px; color: var(--text-secondary); }
.topic-body p { margin-bottom: 6px; }
.topic-body .highlight {
  background: var(--primary-light);
  padding: 1px 6px; border-radius: 3px;
  color: var(--primary); font-weight: 600;
}
.topic-body ul { padding-left: 18px; margin: 4px 0; }
.topic-body li { margin-bottom: 4px; }
.topic-card.marked {
  border-left: 3px solid #22c55e;
}
.topic-card.marked .topic-body {
  display: none;
}
.topic-card.marked .topic-title::after {
  content: ' (已掌握，点击展开)';
  font-size: 12px;
  color: #22c55e;
  font-weight: normal;
}
.mark-btn {
  float: right;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: all 0.2s;
}
.mark-btn:hover { background: #fef3c7; border-color: #f59e0b; }
.mark-btn.marked { background: #dcfce7; border-color: #22c55e; }
.toc-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
}
.toc-overlay.open { display: block; }
.toc-panel {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 2001;
  width: 300px; max-width: 80vw;
  background: var(--toc-bg);
  padding: 20px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.3s;
  border-right: 1px solid var(--border);
}
.toc-panel.open { transform: translateX(0); }
.toc-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--primary); }
.toc-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  margin-bottom: 4px;
}
.toc-item:hover { background: var(--primary-light); color: var(--primary); }
.toc-item .dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.tts-bar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
  transition: background 0.3s;
}
.tts-bar.open { display: block; }
.tts-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; text-align: center; }
.tts-controls { display: flex; align-items: center; justify-content: center; gap: 12px; }
.tts-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.tts-btn:hover { background: var(--primary-light); color: var(--primary); }
.tts-btn.play { width: 48px; height: 48px; background: var(--primary); color: #fff; border-color: var(--primary); }
.tts-btn.play:hover { opacity: 0.85; }
.tts-btn.play.active { background: var(--tts-active); border-color: var(--tts-active); }
.tts-speed {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
}
.tts-speed select {
  padding: 2px 6px; border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 12px;
}
.tts-voice { font-size: 12px; color: var(--text-secondary); margin-top: 4px; text-align: center; }
.tts-highlight {
  background: #fef08a !important;
  border-radius: 2px;
  transition: background 0.1s;
}
[data-theme="dark"] .tts-highlight {
  background: #713f12 !important;
}
.read-progress-badge {
  position: fixed; bottom: 80px; right: 16px; z-index: 999;
  font-size: 11px; color: var(--text-secondary);
  background: var(--card-bg);
  padding: 6px 12px; border-radius: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  opacity: 0;
  transition: opacity 0.3s;
}
.read-progress-badge.show { opacity: 1; }
@media (max-width: 600px) {
  .main { padding: 0 12px; }
  .topic-card { padding: 14px 16px; }
  .subject-header { padding: 12px 16px; }
  .header-title { font-size: 14px; max-width: 140px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">📚 中高考复习资料</div>
  <div class="header-actions">
    <button class="header-btn" onclick="toggleTOC()" title="目录">☰</button>
    <button class="header-btn" onclick="toggleTTS()" title="语音朗读">🔊</button>
    <button class="header-btn" onclick="toggleTheme()" title="切换主题">🌓</button>
  </div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
<div class="toc-overlay" id="tocOverlay" onclick="toggleTOC()"></div>
<div class="toc-panel" id="tocPanel">
  <div class="toc-title">📑 目录</div>
  <div id="tocList"></div>
</div>
<div class="main" id="mainContent"></div>
<div class="tts-bar" id="ttsBar">
  <div class="tts-info" id="ttsInfo">选择一段文字开始朗读</div>
  <div class="tts-controls">
    <button class="tts-btn" onclick="ttsPrev()" title="上一句">⏮</button>
    <button class="tts-btn play" id="ttsPlayBtn" onclick="ttsToggle()" title="播放/暂停">▶</button>
    <button class="tts-btn" onclick="ttsNext()" title="下一句">⏭</button>
    <button class="tts-btn" onclick="ttsStop()" title="停止">⏹</button>
    <div class="tts-speed">
      <span>速度</span>
      <select id="ttsSpeed" onchange="ttsUpdateSpeed()">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
  </div>
  <div class="tts-voice" id="ttsVoiceInfo"></div>
</div>
<div class="read-progress-badge" id="progressBadge">已读 0%</div>
<script>
const DATA = [
  {
    id: "math", title: "数学", icon: "📐", color: "#3b82f6", tag: "数学", tagColor: "var(--tag-math)",
    topics: [
      { title: "集合的基本概念", priority: "high", items: [
        "集合的定义：由确定的、互不相同的元素组成的整体，常用大写字母A、B、C表示。",
        "元素的特性：确定性（元素是否属于集合是确定的）、互异性（集合中元素互不相同）、无序性（元素顺序无关）。",
        "常用数集：N（自然数集，含0）、N+（正整数集）、Z（整数集）、Q（有理数集）、R（实数集）。",
        "表示方法：列举法（{1,2,3}）、描述法（{x|x>0}）、韦恩图（用图形表示集合关系）。"
      ]},
      { title: "集合的运算", priority: "high", items: [
        "交集（∩）：A∩B={x|x∈A且x∈B}，即两个集合的公共元素，性质：A∩B=B∩A，A∩A=A，A∩∅=∅。",
        "并集（∪）：A∪B={x|x∈A或x∈B}，即两个集合的所有元素，性质：A∪B=B∪A，A∪A=A，A∪∅=A。",
        "补集（∁U）：∁UA={x|x∈U且x∉A}，即全集中不属于A的元素，性质：A∪∁UA=U，A∩∁UA=∅。",
        "差集（-）：A-B={x|x∈A且x∉B}，即属于A但不属于B的元素。"
      ]},
      { title: "区间表示法", priority: "mid", items: [
        "闭区间：[a,b]，表示a≤x≤b，包含端点a和b。",
        "开区间：(a,b)，表示a<x<b，不包含端点。",
        "半开半闭区间：[a,b)表示a≤x<b，(a,b]表示a<x≤b。",
        "无穷区间：[a,+∞)表示x≥a，(-∞,b]表示x≤b，(-∞,+∞)表示全体实数。"
      ]},
      { title: "函数的概念", priority: "high", items: [
        "函数定义：设A、B是非空数集，如果按照某种对应关系f，使对于集合A中的任意一个数x，在集合B中都有唯一确定的数f(x)和它对应，那么就称f:A→B为从集合A到集合B的一个函数。",
        "三要素：定义域（自变量x的取值范围）、值域（函数值y的取值范围）、对应关系（函数表达式）。",
        "表示方法：解析法（y=f(x)）、列表法、图像法。",
        "相等函数：定义域和对应关系都相同的两个函数相等，与函数名称无关。"
      ]},
      { title: "函数的定义域", priority: "high", items: [
        "分式函数：分母不能为0，如y=1/x中x≠0。",
        "偶次根式：被开方数非负，如y=√x中x≥0。",
        "对数函数：真数大于0，底数大于0且不等于1，如y=log₂x中x>0。",
        "零次幂：底数不能为0，如y=x⁰中x≠0。",
        "实际问题：结合实际意义确定定义域，如人数不能为负数。"
      ]},
      { title: "函数的值域", priority: "high", items: [
        "配方法：适用于二次函数，如y=x²-2x+3=(x-1)²+2≥2，值域为[2,+∞)。",
        "单调性法：根据函数单调性求值域，如y=x在R上单调递增。",
        "换元法：将复杂函数转化为简单函数，如y=x+√(x-1)，令t=√(x-1)≥0。",
        "不等式法：利用基本不等式a+b≥2√(ab)（a,b>0）求最值。"
      ]},
      { title: "函数的单调性", priority: "high", items: [
        "定义法：设x₁,x₂∈D，若x₁<x₂时恒有f(x₁)<f(x₂)，则f(x)在D上单调递增；若f(x₁)>f(x₂)，则单调递减。",
        "导数法：若f'(x)>0，则f(x)单调递增；若f'(x)<0，则f(x)单调递减。",
        "复合函数单调性：同增异减（内外函数单调性相同则增，不同则减）。",
        "常见结论：增+增=增，减+减=减，增-减=增，减-增=减。"
      ]},
      { title: "函数的奇偶性", priority: "high", items: [
        "判断前提：定义域关于原点对称，否则非奇非偶。",
        "偶函数：f(-x)=f(x)，图像关于y轴对称，如y=x²、y=|x|。",
        "奇函数：f(-x)=-f(x)，图像关于原点对称，如y=x³、y=sinx。",
        "重要性质：奇函数在x=0处有定义，则f(0)=0；偶函数的绝对值是偶函数。"
      ]},
      { title: "二次函数", priority: "high", items: [
        "一般式：y=ax²+bx+c（a≠0），a决定开口方向（a>0向上，a<0向下），a的绝对值越大开口越窄。",
        "顶点式：y=a(x-h)²+k，顶点坐标为(h,k)，对称轴为x=h。",
        "交点式：y=a(x-x₁)(x-x₂)，x₁、x₂是与x轴交点的横坐标。",
        "判别式：Δ=b²-4ac，Δ>0有两个不等实根，Δ=0有一个实根，Δ<0无实根。",
        "最值：a>0时，x=-b/(2a)时y有最小值(4ac-b²)/(4a)；a<0时，x=-b/(2a)时y有最大值。"
      ]},
      { title: "指数函数", priority: "high", items: [
        "定义：y=a^x（a>0且a≠1），定义域为R，值域为(0,+∞)。",
        "图像特征：恒过点(0,1)；a>1时单调递增，0<a<1时单调递减。",
        "运算性质：a^m·a^n=a^(m+n)，a^m÷a^n=a^(m-n)，(a^m)^n=a^(mn)，a^0=1（a≠0）。",
        "特殊值：a^(-n)=1/a^n，√a=a^(1/2)，a^(m/n)=ⁿ√(a^m)。"
      ]},
      { title: "对数函数", priority: "high", items: [
        "定义：y=log_a x（a>0且a≠1），定义域为(0,+∞)，值域为R。",
        "图像特征：恒过点(1,0)；a>1时单调递增，0<a<1时单调递减。",
        "运算性质：log_a(M·N)=log_aM+log_aN，log_a(M/N)=log_aM-log_aN，log_aM^n=nlog_aM。",
        "换底公式：log_ab=log_cb/log_ca，常用log_ab=ln b/ln a或log_ab=lg b/lg a。"
      ]},
      { title: "等差数列", priority: "high", items: [
        "定义：从第二项起，每一项与前一项的差为常数d（公差），即aₙ₊₁-aₙ=d。",
        "通项公式：aₙ=a₁+(n-1)d，已知首项a₁和公差d可求任意项。",
        "求和公式：Sₙ=n(a₁+aₙ)/2=na₁+n(n-1)d/2。",
        "重要性质：若m+n=p+q，则aₘ+aₙ=aₚ+a_q；连续k项的和成等差数列。"
      ]},
      { title: "等比数列", priority: "high", items: [
        "定义：从第二项起，每一项与前一项的比为常数q（公比），即aₙ₊₁/aₙ=q（q≠0）。",
        "通项公式：aₙ=a₁q^(n-1)，注意q≠0，a₁≠0。",
        "求和公式：q≠1时Sₙ=a₁(1-qⁿ)/(1-q)；q=1时Sₙ=na₁（常考q=1的特殊情况）。",
        "重要性质：若m+n=p+q，则aₘ·aₙ=aₚ·a_q；连续k项的和（不为0）成等比数列。"
      ]},
      { title: "概率基础", priority: "high", items: [
        "概率定义：事件发生的可能性大小，0≤P(A)≤1，必然事件P=1，不可能事件P=0。",
        "古典概型：满足有限性（基本事件有限个）和等可能性（每个基本事件概率相等），P(A)=事件A包含的基本事件数/总基本事件数。",
        "互斥事件：不能同时发生的事件，P(A∪B)=P(A)+P(B)。",
        "对立事件：A与∁UA，P(A)+P(∁UA)=1。"
      ]},
      { title: "统计", priority: "high", items: [
        "平均数：反映数据平均水平，¯x=(x₁+x₂+...+xₙ)/n。",
        "中位数：将数据从小到大排列后位于中间位置的数（n为奇数取中间，n为偶数取中间两数的平均）。",
        "众数：出现次数最多的数，可能有多个。",
        "方差：反映数据波动大小，s²=1/n[(x₁-¯x)²+(x₂-¯x)²+...+(xₙ-¯x)²]，方差越小数据越稳定。",
        "标准差：s=√s²，与数据单位相同，更易理解。"
      ]},
      { title: "排列组合", priority: "mid", items: [
        "排列（有序）：从n个不同元素中取k个排成一列，A(n,k)=n!/(n-k)!。",
        "组合（无序）：从n个不同元素中取k个组成一组，C(n,k)=n!/(k!(n-k)!)。",
        "乘法原理：分步完成，总方法数=各步方法数相乘。",
        "加法原理：分类完成，总方法数=各类方法数相加。"
      ]},
      { title: "立体几何", priority: "high", items: [

let currentSubject = null;
let ttsActive = false;
let ttsPaused = false;
let ttsUtterance = null;

let ttsIndex = -1;

let markedTopics = {};

function loadMarkedTopics() {
  const saved = localStorage.getItem('markedTopics');
  if (saved) {
    try {
      markedTopics = JSON.parse(saved);
    } catch(e) {}
  }
}

function saveMarkedTopics() {
  localStorage.setItem('markedTopics', JSON.stringify(markedTopics));
}

function toggleMark(si, ti) {
  const key = `${si}-${ti}`;
  markedTopics[key] = !markedTopics[key];
  saveMarkedTopics();
  const card = document.getElementById(`card-${si}-${ti}`);
  const btn = document.getElementById(`mark-btn-${si}-${ti}`);
  if (markedTopics[key]) {
    card.classList.add('marked');
    btn.classList.add('marked');
    btn.innerHTML = '✓';
  } else {
    card.classList.remove('marked');
    btn.classList.remove('marked');
    btn.innerHTML = '☆';
  }
}

function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  DATA.forEach((subject, si) => {
    const section = document.createElement('div');
    section.className = 'subject-section';
    section.dataset.subject = subject.id;

    const header = document.createElement('div');
    header.className = 'subject-header';
    header.style.background = `linear-gradient(135deg, ${subject.color}22, ${subject.color}11)`;
    header.style.borderLeft = `4px solid ${subject.color}`;
    header.innerHTML = `<span class="icon">${subject.icon}</span><span class="title">${subject.title}</span><span class="tag" style="background:${subject.tagColor}">${subject.tag}</span><span class="arrow">▶</span>`;
    header.onclick = () => toggleSubject(si);
    section.appendChild(header);

    const content = document.createElement('div');
    content.className = 'subject-content';
    content.id = `subject-${si}`;

    subject.topics.forEach((topic, ti) => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.id = `card-${si}-${ti}`;
      const isMarked = markedTopics[`${si}-${ti}`];
      if (isMarked) card.classList.add('marked');

      const titleDiv = document.createElement('div');
      titleDiv.className = 'topic-title';
      const pri = topic.priority === 'high' ? 'priority-high' : 'priority-mid';
      const priLabel = topic.priority === 'high' ? '★ 必考' : '📌 常考';
      titleDiv.innerHTML = `${topic.title} <span class="priority ${pri}">${priLabel}</span>`;

      const markBtn = document.createElement('button');
      markBtn.className = 'mark-btn';
      markBtn.id = `mark-btn-${si}-${ti}`;
      markBtn.innerHTML = isMarked ? '✓' : '☆';
      if (isMarked) markBtn.classList.add('marked');
      markBtn.title = '标记已掌握';
      markBtn.onclick = (e) => { e.stopPropagation(); toggleMark(si, ti); };
      titleDiv.appendChild(markBtn);

      card.appendChild(titleDiv);

      const body = document.createElement('div');
      body.className = 'topic-body';
      topic.items.forEach(item => {
        const p = document.createElement('p');
        p.textContent = item;
        p.dataset.tts = item;
        p.style.cursor = 'pointer';
        p.onclick = () => startTTSFromItem(p);
        body.appendChild(p);
      });
      card.appendChild(body);
      
      // Make the whole card clickable to toggle
      card.onclick = () => {
        if (card.classList.contains('marked')) {
          card.classList.remove('marked');
        }
      };

      content.appendChild(card);
    });

    section.appendChild(content);
    main.appendChild(section);
  });

  renderTOC();
}

function toggleSubject(si) {
  const content = document.getElementById(`subject-${si}`);
  const section = content.closest('.subject-section');
  const arrow = section.querySelector('.arrow');
  const isOpen = content.classList.contains('open');

  document.querySelectorAll('.subject-content').forEach(c => {
    c.classList.remove('open');
    c.closest('.subject-section').querySelector('.arrow').classList.remove('open');
  });

  if (!isOpen) {
    content.classList.add('open');
    arrow.classList.add('open');
    currentSubject = si;
  } else {
    currentSubject = null;
  }
}

function renderTOC() {
  const list = document.getElementById('tocList');
  list.innerHTML = '';
  DATA.forEach((subject, si) => {
    const item = document.createElement('div');
    item.className = 'toc-item';
    item.innerHTML = `<span class="dot" style="background:${subject.color}"></span><span>${subject.icon} ${subject.title}</span>`;
    item.onclick = () => {
      toggleTOC();
      const section = document.querySelector(`[data-subject="${subject.id}"]`);
      section.scrollIntoView({ behavior: 'smooth' });
      toggleSubject(si);
    };
    list.appendChild(item);
  });
}

function toggleTOC() {
  const overlay = document.getElementById('tocOverlay');
  const panel = document.getElementById('tocPanel');
  const isOpen = overlay.classList.contains('open');
  if (isOpen) {
    overlay.classList.remove('open');
    panel.classList.remove('open');
  } else {
    overlay.classList.add('open');
    panel.classList.add('open');
  }
}

function toggleTheme() {
  const html = document.documentElement;
  if (html.dataset.theme === 'dark') {
    html.dataset.theme = 'light';
    localStorage.setItem('theme', 'light');
  } else {
    html.dataset.theme = 'dark';
    localStorage.setItem('theme', 'dark');
  }
}

function loadTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
  }
}

function saveProgress() {
  localStorage.setItem('scrollPos', window.scrollY);
  localStorage.setItem('currentSubject', JSON.stringify(currentSubject));
}

function loadProgress() {
  const saved = localStorage.getItem('scrollPos');
  const subj = localStorage.getItem('currentSubject');
  if (subj) {
    try {
      const si = JSON.parse(subj);
      if (si !== null && si !== undefined) {
        setTimeout(() => toggleSubject(si), 100);
      }
    } catch(e) {}
  }
  if (saved) {
    const pos = parseInt(saved, 10);
    setTimeout(() => window.scrollTo(0, pos), 150);
  }
}

function updateProgressBar() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  document.getElementById('progressFill').style.width = `${progress}%`;
  const badge = document.getElementById('progressBadge');
  badge.textContent = `已读 ${Math.round(progress)}%`;
  badge.classList.add('show');
}

function toggleTTS() {
  const bar = document.getElementById('ttsBar');
  const btn = document.querySelector('.header-btn:nth-child(2)');
  if (ttsActive) {
    ttsStop();
  } else {
    bar.classList.add('open');
    btn.classList.add('active');
    collectTTS();
  }
}

function collectTTS() {
  ttsSentences = [];
  document.querySelectorAll('.topic-card').forEach(card => {
    if (!card.classList.contains('marked')) {
      card.querySelectorAll('.topic-body p[data-tts]').forEach(p => {
        ttsSentences.push({ element: p, text: p.dataset.tts });
      });
    }
  });
  if (ttsSentences.length > 0) {
    ttsIndex = 0;
    ttsActive = true;
    ttsPaused = false;
    speakCurrent();
  } else {
    document.getElementById('ttsInfo').textContent = '没有可朗读的内容（所有内容都已标记为已掌握）';
  }
}

function startTTSFromItem(element) {
  ttsStop();
  const text = element.dataset.tts;
  const index = ttsSentences.findIndex(s => s.element === element);
  
  if (index === -1) {
    // 重新收集所有内容
    collectTTS();
    const newIndex = ttsSentences.findIndex(s => s.element === element);
    if (newIndex !== -1) {
      ttsIndex = newIndex;
      ttsActive = true;
      ttsPaused = false;
      document.getElementById('ttsBar').classList.add('open');
      document.querySelector('.header-btn:nth-child(2)').classList.add('active');
      speakCurrent();
    }
  } else {
    ttsIndex = index;
    ttsActive = true;
    ttsPaused = false;
    document.getElementById('ttsBar').classList.add('open');
    document.querySelector('.header-btn:nth-child(2)').classList.add('active');
    speakCurrent();
  }
}

function ttsToggle() {
  if (!ttsActive && ttsSentences.length === 0) {
    collectTTS();
    return;
  }
  if (ttsPaused) {
    ttsPaused = false;
    document.getElementById('ttsPlayBtn').textContent = '❚❚';
    document.getElementById('ttsPlayBtn').classList.add('active');
    speakCurrent();
  } else if (ttsActive) {
    ttsPaused = true;
    window.speechSynthesis.pause();
    document.getElementById('ttsPlayBtn').textContent = '▶';
    document.getElementById('ttsPlayBtn').classList.remove('active');
  }
}

function ttsStop() {
  ttsActive = false;
  ttsPaused = false;
  ttsIndex = -1;
  window.speechSynthesis.cancel();
  document.getElementById('ttsBar').classList.remove('open');
  document.querySelector('.header-btn:nth-child(2)').classList.remove('active');
  document.getElementById('ttsPlayBtn').textContent = '▶';
  document.getElementById('ttsPlayBtn').classList.remove('active');
  document.getElementById('ttsInfo').textContent = '选择一段文字开始朗读';
  clearHighlight();
  if (ttsTimer) { clearTimeout(ttsTimer); ttsTimer = null; }
}

function ttsPrev() {
  if (ttsIndex > 0) {
    ttsIndex--;
    window.speechSynthesis.cancel();
    speakCurrent();
  }
}

function ttsNext() {
  if (ttsIndex < ttsSentences.length - 1) {
    ttsIndex++;
    window.speechSynthesis.cancel();
    speakCurrent();
  } else {
    ttsStop();
    document.getElementById('ttsInfo').textContent = '✅ 朗读完毕';
  }
}

  // Speed is read when speaking
}

function speakCurrent() {
  if (ttsIndex < 0 || ttsIndex >= ttsSentences.length) {
    ttsStop();
    if (ttsIndex >= ttsSentences.length) document.getElementById('ttsInfo').textContent = '✅ 朗读完毕';
    return;
  }
  clearHighlight();
  const item = ttsSentences[ttsIndex];
  if (item.element) item.element.classList.add('tts-highlight');
  item.element.scrollIntoView({ behavior: 'smooth', block: 'center' });

  const utterance = new SpeechSynthesisUtterance(item.text);
  utterance.lang = 'zh-CN';
  utterance.rate = parseFloat(document.getElementById('ttsSpeed').value);
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;

  utterance.onend = () => {
    if (ttsActive && !ttsPaused) {
      ttsTimer = setTimeout(() => {
        ttsIndex++;
        speakCurrent();
      }, 300);
    }
  };
  utterance.onerror = () => {
    if (ttsActive) {
      ttsIndex++;
      speakCurrent();
    }
  };
  window.speechSynthesis.speak(utterance);
  document.getElementById('ttsInfo').textContent = `朗读进度：${ttsIndex + 1}/${ttsSentences.length}`;
  document.getElementById('ttsPlayBtn').textContent = '❚❚';
  document.getElementById('ttsPlayBtn').classList.add('active');
}

function clearHighlight() {
  document.querySelectorAll('.tts-highlight').forEach(el => el.classList.remove('tts-highlight'));
}

window.addEventListener('scroll', () => {
  updateProgressBar();
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(saveProgress, 500);
});

window.speechSynthesis.onvoiceschanged = () => {
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  document.getElementById('ttsVoiceInfo').textContent = zhVoice ? `朗读音色：${zhVoice.name}` : '';
};

loadTheme();
loadMarkedTopics();
render();
loadProgress();
updateProgressBar();
</script>
</body>
</html>
